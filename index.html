<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitJournal">
<title>FitJournal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--bg2:#efe8dc;--bg3:#e8dfce;--bg4:#ddd1bb;--line:#e0d4be;--line2:#cdbfa5;--ink:#2d251c;--ink2:#6b5f50;--ink3:#9a8c78;--accent:#b85d3e;--accent2:#a04e30;--accentBg:#f0d9c8;--sage:#7a8a6f;--sageBg:#dde2d4;--teal:#5e8a8c;--tealBg:#d6e4e5;--plum:#8a5a7a;--plumBg:#e6d6e0;--sand:#c9a876;--sandBg:#ebdcc0;--err:#b04a3e;--errBg:#f0d4cf}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,sans-serif;font-size:15px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom));overflow-x:hidden}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink);-webkit-appearance:none;appearance:none}

.shell{max-width:460px;margin:0 auto;padding:20px 18px 32px}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(–ink3);font-size:13px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;background:var(–accent);display:flex;align-items:center;justify-content:center;color:var(–bg);font-size:16px;font-weight:700}
.hdr-name{font-size:15px;font-weight:600}
.ibtn{width:36px;height:36px;border-radius:10px;background:var(–bg2);border:1px solid var(–line);color:var(–ink2);display:flex;align-items:center;justify-content:center}

/* Greeting */
.greet{margin-bottom:28px}
.greet-date{font-size:11px;color:var(–ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.greet-h{font-size:clamp(32px,9vw,42px);font-weight:600;line-height:1.05;letter-spacing:-.03em}
.greet-h .name{color:var(–accent)}
.greet-sub{margin-top:10px;font-size:14px;color:var(–ink2)}

/* Section label */
.slbl{display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px;font-size:10px;font-weight:600;color:var(–ink2);text-transform:uppercase;letter-spacing:.12em}

/* Stat hero */
.stat-hero{background:var(–accentBg);border:1px solid rgba(184,93,62,.2);border-radius:16px;padding:18px;margin-bottom:10px;width:100%;text-align:left;display:block}
.stat-hero-lbl{font-size:10px;font-weight:600;color:var(–accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.stat-hero-num{font-size:38px;font-weight:600;letter-spacing:-.04em;line-height:1}
.stat-hero-num small{font-size:16px;color:var(–accent);font-weight:500;margin-left:4px}
.stat-hero-detail{font-size:13px;color:var(–ink2);margin-top:8px}
.stat-hero-bar{height:4px;background:rgba(184,93,62,.15);border-radius:99px;margin-top:12px;overflow:hidden}
.stat-hero-fill{height:100%;background:var(–accent);border-radius:99px;transition:width .5s}

/* Mini stats */
.minis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.mini{background:var(–bg2);border:1px solid var(–line);border-radius:14px;padding:14px 12px;text-align:left}
.mini-lbl{font-size:9px;font-weight:600;color:var(–ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.mini-num{font-size:20px;font-weight:600;letter-spacing:-.03em}
.mini-num small{font-size:11px;color:var(–ink3);font-weight:400;margin-left:2px}
.mini-bar{height:3px;background:rgba(0,0,0,.06);border-radius:99px;margin-top:8px;overflow:hidden}
.mini-bar div{height:100%;border-radius:99px}

/* Module cards */
.mods{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mod{background:var(–bg2);border:1px solid var(–line);border-radius:14px;padding:16px;text-align:left;display:flex;flex-direction:column;min-height:100px}
.mod.full{grid-column:span 2}
.mod-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mod-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.mod-pill{font-size:10px;font-weight:600;color:var(–ink2);background:var(–bg);padding:3px 8px;border-radius:6px;border:1px solid var(–line)}
.mod-name{font-size:15px;font-weight:600;margin-bottom:2px}
.mod-meta{font-size:12px;color:var(–ink3);flex:1}
.mod-arr{color:var(–ink3);font-size:14px;align-self:flex-end;margin-top:6px}

/* Quote */
.quote{margin-top:24px;background:var(–sageBg);border:1px solid rgba(122,138,111,.2);border-radius:14px;padding:18px}
.quote-mark{font-size:28px;font-weight:700;color:var(–sage);opacity:.5;margin-bottom:4px}
.quote-text{font-size:15px;line-height:1.5;font-weight:450}
.quote-attr{font-size:10px;color:var(–sage);text-transform:uppercase;letter-spacing:.1em;margin-top:12px;font-weight:600}

/* Inputs */
.inp{width:100%;background:var(–bg2);border:1.5px solid var(–line);border-radius:11px;padding:13px 14px;font-size:15px;color:var(–ink);outline:none}
.inp:focus{border-color:var(–accent)}
.inp::placeholder{color:var(–ink3)}
.inp-lbl{display:block;font-size:12px;font-weight:500;color:var(–ink2);margin-bottom:8px}
.field{margin-bottom:16px}
.field2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Add bar */
.addbar{display:flex;gap:6px;background:var(–bg2);border:1.5px solid var(–line);border-radius:12px;padding:5px;margin-bottom:14px}
.addbar:focus-within{border-color:var(–accent)}
.addbar input{flex:1;background:none;border:none;outline:none;padding:10px 12px;font-size:15px;color:var(–ink);min-width:0}
.addbar input::placeholder{color:var(–ink3)}
.addbtn{background:var(–accent);color:var(–bg);width:38px;height:38px;border-radius:9px;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Buttons */
.btn{padding:12px 18px;border-radius:11px;font-size:14px;font-weight:500;background:var(–bg2);border:1.5px solid var(–line);color:var(–ink);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.pri{background:var(–accent);border-color:var(–accent);color:#fff;font-weight:600}
.btn.dan{color:var(–err);background:var(–errBg);border-color:rgba(176,74,62,.2)}
.btn.full{width:100%}
.btn:disabled{opacity:.5}

/* CTA */
.cta{background:var(–accentBg);border:1.5px solid rgba(184,93,62,.2);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;width:100%;text-align:left}
.cta-icon{width:42px;height:42px;border-radius:11px;background:var(–accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.cta-body{flex:1}
.cta-pre{font-size:10px;font-weight:600;color:var(–accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.cta-h{font-size:17px;font-weight:600;letter-spacing:-.02em}
.cta-arr{color:var(–accent);font-size:20px}

/* Rows */
.row{background:var(–bg2);border:1px solid var(–line);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;width:100%;text-align:left}
.row:active{background:var(–bg3)}
.row-num{font-size:11px;font-weight:600;color:var(–ink3);width:22px;flex-shrink:0}
.row-body{flex:1;min-width:0}
.row-title{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-sub{font-size:12px;color:var(–ink3);margin-top:2px}
.row-arr{color:var(–ink3);font-size:14px}
.row-del{color:var(–ink3);font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.row-del:active{color:var(–err);background:var(–errBg)}

.empty{background:var(–bg2);border:1.5px dashed var(–line2);border-radius:14px;padding:30px 20px;text-align:center}
.empty-icon{font-size:32px;color:var(–ink3)}
.empty-text{font-size:13px;color:var(–ink2);margin-top:12px;line-height:1.5}

/* Chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:9px 14px;border-radius:10px;background:var(–bg2);border:1px solid var(–line);color:var(–ink2);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0}
.chip.on{background:var(–ink);border-color:var(–ink);color:var(–bg)}
.chip.add{border-style:dashed;color:var(–ink3)}

/* Back link */
.back{display:inline-flex;align-items:center;gap:6px;margin-bottom:18px;font-size:13px;color:var(–ink2);padding:7px 12px 7px 8px;border-radius:8px;background:var(–bg2);border:1px solid var(–line);font-weight:500}
.pg-h{font-size:30px;font-weight:600;letter-spacing:-.04em;margin-bottom:6px}
.pg-h .ac{color:var(–accent)}
.pg-sub{font-size:13px;color:var(–ink3);margin-bottom:22px}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(245,240,232,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(–line);padding:8px 16px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:50}
.nav-b{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(–ink3);font-size:20px}
.nav-b.on{background:var(–accent);color:#fff}

/* Modal */
.mdl-bg{position:fixed;inset:0;background:rgba(45,37,28,.55);backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.mdl-bg.open{opacity:1;pointer-events:auto}
.mdl{background:var(–bg);border:1px solid var(–line);border-radius:20px 20px 0 0;max-width:520px;width:100%;padding:24px 20px calc(28px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1)}
.mdl-bg.open .mdl{transform:translateY(0)}
.mdl-handle{width:36px;height:4px;background:var(–line2);border-radius:2px;margin:-8px auto 16px}
.mdl-title{font-size:22px;font-weight:600;letter-spacing:-.03em;margin-bottom:4px}
.mdl-sub{font-size:13px;color:var(–ink3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(–line)}
.mdl-acts{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.mdl-acts .btn{flex:1;min-width:90px}

/* Toast */
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);background:var(–ink);color:var(–bg);font-size:13px;font-weight:500;padding:11px 20px;border-radius:99px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Auth */
.auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:400px}
.auth-logo{width:48px;height:48px;border-radius:14px;background:var(–accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;margin:0 auto 20px}
.auth-h{font-size:36px;font-weight:600;letter-spacing:-.04em;text-align:center}
.auth-h .ac{color:var(–accent)}
.auth-sub{text-align:center;font-size:14px;color:var(–ink2);margin:10px 0 28px}
.auth-form{background:var(–bg2);border:1px solid var(–line);border-radius:16px;padding:22px}
.auth-err{background:var(–errBg);color:var(–err);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.auth-tog{text-align:center;margin-top:20px;font-size:13px;color:var(–ink2)}
.auth-tog button{color:var(–accent);font-weight:600;text-decoration:underline}

/* Onboarding */
.ob{max-width:440px;margin:0 auto;padding:28px 20px calc(40px + env(safe-area-inset-bottom));min-height:100vh;display:flex;flex-direction:column}
.ob-prog{display:flex;gap:5px;margin-bottom:28px}
.ob-bar{flex:1;height:4px;background:var(–bg3);border-radius:2px}
.ob-bar.done,.ob-bar.cur{background:var(–accent)}
.ob-step{font-size:10px;font-weight:600;color:var(–ink3);text-transform:uppercase;letter-spacing:.16em;margin-bottom:14px}
.ob-q{font-size:28px;font-weight:600;letter-spacing:-.03em;margin-bottom:8px;line-height:1.1}
.ob-q .ac{color:var(–accent)}
.ob-help{font-size:14px;color:var(–ink2);margin-bottom:24px;line-height:1.5}
.ob-opts{display:grid;gap:8px;margin-bottom:20px}
.ob-opt{padding:15px 18px;border-radius:12px;background:var(–bg2);border:1.5px solid var(–line);text-align:left;display:flex;justify-content:space-between;align-items:center;gap:14px;width:100%;color:var(–ink)}
.ob-opt.sel{border-color:var(–accent);background:var(–accentBg)}
.ob-opt-t{font-size:15px;font-weight:600}
.ob-opt-s{font-size:12px;color:var(–ink2);margin-top:2px}
.ob-opt-chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(–line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(–bg)}
.ob-opt.sel .ob-opt-chk{background:var(–accent);border-color:var(–accent);color:#fff;font-size:13px;font-weight:700}
.ob-acts{margin-top:auto;padding-top:20px;display:flex;gap:8px}
.ob-acts .btn{flex:1}
.ob-tag{font-size:9px;color:var(–accent);background:var(–accentBg);padding:2px 7px;border-radius:5px;margin-left:8px;text-transform:uppercase;font-weight:600;letter-spacing:.05em}
.ob-tag.sup{color:var(–teal);background:var(–tealBg)}

/* Habits */
.hab{background:var(–bg2);border:1px solid var(–line);border-radius:14px;padding:16px;margin-bottom:10px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
.hab-name{font-size:15px;font-weight:600}
.hab-streak{font-size:11px;color:var(–ink3);margin-top:4px}
.hab-streak strong{color:var(–accent)}
.hab-heat{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;margin-top:10px;max-width:240px}
.hcell{aspect-ratio:1;background:var(–bg3);border-radius:2px}
.hcell.on{background:var(–sage)}
.hcell.today{outline:1.5px solid var(–ink);outline-offset:1px}
.hab-chk{width:46px;height:46px;border-radius:12px;border:1.5px solid var(–line2);background:var(–bg);display:flex;align-items:center;justify-content:center;font-size:22px}
.hab-chk.on{background:var(–sage);border-color:var(–sage);color:#fff}

/* Nutrition */
.nut-hero{background:var(–accentBg);border:1px solid rgba(184,93,62,.2);border-radius:16px;padding:20px 18px;margin-bottom:12px}
.nut-grid{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
.nut-lbl{font-size:10px;font-weight:600;color:var(–accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.nut-num{font-size:40px;font-weight:600;letter-spacing:-.04em;line-height:.95}
.nut-num small{font-size:16px;color:var(–accent);font-weight:500;margin-left:4px}
.nut-detail{font-size:13px;color:var(–ink2);margin-top:8px}
.donut{width:80px;height:80px;position:relative}
.donut svg{transform:rotate(-90deg)}
.donut-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-size:18px;font-weight:700;letter-spacing:-.02em}
.donut-lbl{font-size:8px;color:var(–ink3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.macro{background:var(–bg2);border:1px solid var(–line);border-radius:12px;padding:12px}
.macro-lbl{font-size:9px;font-weight:600;color:var(–ink2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.macro-num{font-size:18px;font-weight:600;letter-spacing:-.02em}
.macro-num small{font-size:11px;color:var(–ink3);font-weight:400}
.macro-bar{height:3px;background:rgba(0,0,0,.06);border-radius:99px;margin-top:8px;overflow:hidden}
.macro-bar div{height:100%;border-radius:99px}

.search{background:var(–bg2);border:1.5px solid var(–line);border-radius:12px;padding:5px;display:flex;gap:5px;align-items:center;margin-bottom:10px}
.search:focus-within{border-color:var(–accent)}
.search-ico{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(–ink3);font-size:16px}
.search input{flex:1;background:none;border:none;outline:none;padding:10px 4px;font-size:15px;color:var(–ink);min-width:0}
.search input::placeholder{color:var(–ink3)}
.scan-btn{background:var(–ink);color:var(–bg);width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.qacts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.qact{background:var(–bg2);border:1.5px solid var(–line);border-radius:11px;padding:11px 14px;font-size:13px;color:var(–ink);font-weight:500;text-align:center}

.meal{background:var(–bg2);border:1px solid var(–line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.meal-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(–line)}
.meal-nm{font-size:17px;font-weight:600;letter-spacing:-.02em}
.meal-mt{display:flex;align-items:center;gap:10px}
.meal-kcal{font-size:11px;color:var(–ink2);font-weight:500}
.meal-kcal strong{color:var(–ink);font-weight:700}
.meal-add{width:30px;height:30px;border-radius:8px;background:var(–accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}
.frow{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:11px 14px;align-items:center;border-bottom:1px solid var(–line)}
.frow:last-child{border-bottom:none}
.fname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fmeta{font-size:10px;color:var(–ink3);margin-top:2px}
.fkcal{font-size:15px;font-weight:600;text-align:right}
.fkcal small{font-size:9px;color:var(–ink3);display:block;font-weight:400}
.fdel{color:var(–ink3);font-size:16px;padding:6px;border-radius:6px}
.fdel:active{color:var(–err);background:var(–errBg)}
.meal-empty{padding:18px;text-align:center;color:var(–ink3);font-size:13px}

.water{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;background:var(–bg2);border:1px solid var(–line);border-radius:14px;padding:14px;margin-bottom:14px}
.water-amt{font-size:24px;font-weight:600;letter-spacing:-.03em}
.water-amt span{font-size:13px;color:var(–ink3);font-weight:400;margin-left:4px}
.water-btn{width:42px;height:42px;border-radius:10px;background:var(–tealBg);border:1px solid rgba(94,138,140,.3);color:var(–teal);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* Weight */
.wt-hero{background:var(–plumBg);border:1px solid rgba(138,90,122,.2);border-radius:16px;padding:22px;margin-bottom:14px}
.wt-big{font-size:56px;font-weight:600;letter-spacing:-.05em;line-height:.9}
.wt-big span{font-size:18px;color:var(–plum);font-weight:500;margin-left:6px}
.wt-deltas{display:flex;gap:18px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(138,90,122,.18)}
.wt-di{flex:1}
.wt-dl{font-size:10px;font-weight:600;color:var(–plum);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.wt-dv{font-size:20px;font-weight:600;letter-spacing:-.03em}
.wt-dv.dn{color:var(–sage)} .wt-dv.up{color:var(–accent)}

/* Chart */

function loadScript(url) {

    s.onload = ok;
    s.onerror = function() { fail(new Error('Failed to load: ' + url)); };
    document.head.appendChild(s);
  });
}

function startApp() {

var SB_URL = 'https://mufqgmprllaukxakqbil.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZnFnbXBybGxhdWt4YWtxYmlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDEzODksImV4cCI6MjA5MTc3NzM4OX0.iBWKk_TeLs1097fJ3XlsPFmFFraiGwDebvnTCDXKf6w';

// Helpers
var pad=function(n){return String(n).padStart(2,'0')};
var today=function(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())};
var addDays=function(iso,delta){var d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+delta);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())};
var MO=['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var fmtDate=function(iso){if(!iso)return'\u2014';var p=iso.split('-');return parseInt(p[2])+'. '+MO[parseInt(p[1])-1]+' '+p[0]};
var fmtShort=function(iso){if(!iso)return'\u2014';var p=iso.split('-');return p[2]+'.'+p[1]+'.'};
var esc=function(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})};
var uid=function(){return crypto.randomUUID()};

var toastTmr;
function flash(msg,err){$toast.textContent=msg||'Gespeichert';$toast.style.background=err?'var(--err)':'var(--ink)';$toast.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(function(){$toast.classList.remove('show')},1500)}

window.addEventListener('online',function(){isOnline=true;syncOutbox();render()});
window.addEventListener('offline',function(){isOnline=false;render()});

// Outbox
async function enq(table,op,payload){await db.outbox.add({table:table,op:op,payload:payload,ts:Date.now()});if(isOnline)syncOutbox()}
var syncing=false;
async function syncOutbox(){
  if(syncing||!isOnline||!userId)return;syncing=true;
  try{
    var items=await db.outbox.orderBy('id').toArray();
    for(var i=0;i<items.length;i++){
      var it=items[i];
      try{
        var r;
        if(it.op==='insert')r=await sb.from(it.table).insert(it.payload);
        else if(it.op==='update')r=await sb.from(it.table).update(it.payload).eq('id',it.payload.id);
        else if(it.op==='delete')r=await sb.from(it.table).delete().eq('id',it.payload.id);
        if(r&&r.error)throw r.error;
        await db.outbox.delete(it.id);
      }catch(e){console.warn('sync fail',it.table,e.message);break}
    }
  }finally{syncing=false}
}

async function ins(table,row){
  if(!row.id)row.id=uid();if(!row.user_id)row.user_id=userId;
  if(!row.created_at)row.created_at=new Date().toISOString();
  row.updated_at=new Date().toISOString();
  await db[table].put(row);await enq(table,'insert',row);return row;
}
async function upd(table,id,patch){
  var ex=await db[table].get(id);if(!ex)return null;
  var u=Object.assign({},ex,patch,{updated_at:new Date().toISOString()});
  await db[table].put(u);await enq(table,'update',u);return u;
}
async function del(table,id){await db[table].delete(id);await enq(table,'delete',{id:id})}

async function pullAll(){
  if(!isOnline||!userId)return;
  var tables=[['training_plans','plans'],['training_days','days'],['exercises','exercises'],['workouts','workouts'],['workout_sets','workout_sets'],['habits','habits'],['habit_logs','habit_logs'],['foods','foods'],['food_entries','food_entries'],['water_logs','water_logs'],['weights','weights'],['mood_entries','mood_entries']];
  try{
    var pr=await sb.from('profiles').select('*').eq('id',userId).single();
    if(pr.data&&!pr.error){profile=pr.data;await db.profile.put(Object.assign({id:userId},pr.data))}
  }catch(e){console.warn('profile pull fail',e.message)}
  for(var i=0;i<tables.length;i++){
    try{
      var r=await sb.from(tables[i][0]).select('*');
      if(r.error){console.warn('skip',tables[i][0],r.error.message);continue}
      var lt=tables[i][1];
      if(db[lt]){await db[lt].clear();if(r.data&&r.data.length)await db[lt].bulkPut(r.data)}
    }catch(e2){console.warn('pull fail',tables[i][0],e2.message)}
  }
}

// Boot
async function boot(){
  try{
    var r=await sb.auth.getSession();
    if(r.error)throw r.error;
    await onSession(r.data.session);
    sb.auth.onAuthStateChange(function(_e,s){onSession(s)});
  }catch(e){
    console.error('boot fail',e);
    $app.innerHTML='<div style="padding:40px 20px;text-align:center"><h2 style="color:var(--err)">Startfehler</h2><p style="margin:12px 0;font-size:13px;color:var(--ink2)">'+esc(e.message)+'</p><button onclick="location.reload()" class="btn pri full" style="margin-top:16px">Neu laden</button></div>';
  }
}
async function onSession(sess){
  session=sess;userId=sess?sess.user.id:null;
  if(!userId){V.screen='auth';profile=null;render();return}
  var cp=await db.profile.get(userId);
  if(cp)profile=cp;
  await pullAll();
  await syncOutbox();
  V.screen=(!profile||!profile.onboarding_completed)?'onboarding':'home';
  render();
}

function obHabits(){
  var exp=OB.data.experience||'beginner',ee=OB.data.emotional_eating||'never';
  var rec=exp==='beginner'?['water_morning','walk_10min','log_meals']:exp==='intermediate'?['water_2l','walk_steps','log_meals','protein_meal','sleep_7h']:['water_2l','log_meals','protein_meal','sleep_7h','stretch_5min'];
  if(ee==='often')rec=rec.concat(['mood_check','pre_meal_pause','craving_journal','mindful_eating','self_compassion']);
  else if(ee==='sometimes')rec=rec.concat(['mood_check','pre_meal_pause','mindful_eating']);
  if(!OB._hi){OB.data.sel_habits=rec.slice();OB._hi=true}
  var sorted=HLIB.slice();if(ee!=='never')sorted.sort(function(a,b){return a.t==='sup'&&b.t!=='sup'?-1:b.t==='sup'&&a.t!=='sup'?1:0});
  return'<h1 class="ob-q">Deine <span class="ac">Habits.</span></h1><p class="ob-help">'+(ee==='often'?'Habits die bei emotionalen Essmustern helfen.':'Klein anfangen, gro\u00df werden.')+'</p><div class="ob-opts" style="max-height:48vh;overflow-y:auto">'+sorted.map(function(h){var sel=OB.data.sel_habits.indexOf(h.k)>=0;var isRec=rec.indexOf(h.k)>=0;return'<button class="ob-opt'+(sel?' sel':'')+'" onclick="obTogHab(\''+h.k+'\')"><div><div class="ob-opt-t">'+h.n+(isRec?'<span class="ob-tag'+(h.t==='sup'?' sup':'')+'">'+(h.t==='sup'?'Support':'Empfohlen')+'</span>':'')+'</div><div class="ob-opt-s">'+h.d+'</div></div><div class="ob-opt-chk">'+(sel?'\u2713':'')+'</div></button>'}).join('')+'</div><div class="ob-acts"><button class="btn" onclick="obBack()">\u2190 Zur\u00fcck</button><button class="btn pri" onclick="obFinish()">Fertig \u2713</button></div>';
}

function obSet(k,v){OB.data[k]=v;render()}
function obTogHab(k){var i=OB.data.sel_habits.indexOf(k);if(i>=0)OB.data.sel_habits.splice(i,1);else OB.data.sel_habits.push(k);render()}
function obBack(){if(OB.step>0)OB.step--;render()}
function obNext(step){
  if(step==='welcome'){var v=($('obName')||{}).value;if(!v||!v.trim()){flash('Name eingeben',true);return}OB.data.display_name=v.trim()}
  if(step==='basics'){var b=($('obBirth')||{}).value;if(!b){flash('Geburtsdatum fehlt',true);return}if(!OB.data.sex){flash('Geschlecht w\u00e4hlen',true);return}OB.data.birth_date=b}
  if(step==='body'){var h=parseFloat(($('obH')||{}).value),w=parseFloat(($('obW')||{}).value);if(!h||!w){flash('Beide Felder ausf\u00fcllen',true);return}OB.data.height_cm=h;OB.data.weight_kg=w}
  OB.step++;render();
}

function calcTargets(d){
  var age=new Date().getFullYear()-new Date(d.birth_date).getFullYear();
  var w=d.weight_kg,h=d.height_cm;
  var bmr=d.sex==='male'?10*w+6.25*h-5*age+5:d.sex==='female'?10*w+6.25*h-5*age-161:10*w+6.25*h-5*age-78;
  var fac={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
  var tdee=bmr*(fac[d.activity_level]||1.4);
  var kcal=tdee;
  if(d.goal==='lose')kcal-=400;else if(d.goal==='gain')kcal+=300;else if(d.goal==='recomp')kcal-=200;
  kcal=Math.round(kcal/10)*10;
  var protein=Math.round(w*1.8),fat=Math.round(kcal*0.25/9),carbs=Math.round((kcal-protein*4-fat*9)/4);
  return{kcal:kcal,protein:protein,carbs:carbs,fat:fat};
}

async function obFinish(){
  try{
    var t=calcTargets(OB.data);
    var pd={id:userId,display_name:OB.data.display_name,birth_date:OB.data.birth_date,sex:OB.data.sex,height_cm:OB.data.height_cm,goal:OB.data.goal,target_weight_kg:OB.data.target_weight_kg,activity_level:OB.data.activity_level,experience:OB.data.experience,emotional_eating:OB.data.emotional_eating,kcal_target:t.kcal,protein_target_g:t.protein,carbs_target_g:t.carbs,fat_target_g:t.fat,water_target_ml:2500,onboarding_completed:true,updated_at:new Date().toISOString()};
    await db.profile.put(pd);await enq('profiles','update',pd);profile=pd;
    if(OB.data.weight_kg)await ins('weights',{measured_on:today(),weight_kg:OB.data.weight_kg});
    for(var i=0;i<OB.data.sel_habits.length;i++){
      var def=HLIB.find(function(h){return h.k===OB.data.sel_habits[i]});
      if(def)await ins('habits',{name:def.n,description:def.d,target_frequency:7,active:true,sort_order:i});
    }
    flash('Willkommen!');V.screen='home';render();syncOutbox();
  }catch(e){console.error('ob fail',e);flash('Fehler: '+e.message,true)}
}

async function renderDay(){
  var d=await db.days.get(V.dayId);if(!d){V.screen='plan';return render()}

async function openTrack(){
  V.screen='track';var days=await db.days.where('plan_id').equals(V.planId).toArray();
  if(!days.length){flash('Erst Tage anlegen',true);V.screen='plan';render();return}
  days.sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0)});
  V.trackDayId=days[0].id;
  var ws=await db.workouts.toArray();var pw=ws.filter(function(w){return w.plan_id===V.planId});
  V.week=pw.length?Math.max.apply(null,pw.map(function(w){return w.week_number||1})):1;
  render();
}

async function renderTrack(){
  var p=await db.plans.get(V.planId);if(!p){V.screen='training';return render()}
  var days=(await db.days.where('plan_id').equals(V.planId).toArray()).sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0)});
  if(!days.length){V.screen='plan';return render()}
  if(!V.trackDayId||!days.find(function(d){return d.id===V.trackDayId}))V.trackDayId=days[0].id;
  var curDay=days.find(function(d){return d.id===V.trackDayId});

  var allWk=await db.workouts.toArray();var pWk=allWk.filter(function(w){return w.plan_id===V.planId});
  var weeks=[]; pWk.forEach(function(w){var wn=w.week_number||1;if(weeks.indexOf(wn)<0)weeks.push(wn)});
  if(weeks.indexOf(V.week)<0)weeks.push(V.week);weeks.sort(function(a,b){return a-b});

  var wk=pWk.find(function(w){return w.day_id===V.trackDayId&&(w.week_number||1)===V.week});
  if(!wk){
    wk=await ins('workouts',{plan_id:V.planId,day_id:V.trackDayId,workout_date:today(),week_number:V.week});
    var exs=await db.exercises.where('day_id').equals(V.trackDayId).toArray();
    for(var i=0;i<exs.length;i++)for(var j=0;j<exs[i].target_sets;j++)await ins('workout_sets',{workout_id:wk.id,exercise_id:exs[i].id,set_number:j+1,reps:null,intensity:exs[i].intensity||null,done:false});
  }

  var exs=(await db.exercises.where('day_id').equals(curDay.id).toArray()).sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0)});
  var allSets=await db.workout_sets.where('workout_id').equals(wk.id).toArray();
  var byEx={};allSets.forEach(function(s){if(!byEx[s.exercise_id])byEx[s.exercise_id]=[];byEx[s.exercise_id].push(s)});
  for(var k in byEx)byEx[k].sort(function(a,b){return(a.set_number||0)-(b.set_number||0)});
  var totalS=0,doneS=0;exs.forEach(function(ex){var s=byEx[ex.id]||[];totalS+=s.length;doneS+=s.filter(function(x){return x.done}).length});
  var pct=totalS?Math.round(doneS/totalS*100):0;

  $app.innerHTML='<div class="shell"><button class="back" onclick="openPlan(\''+p.id+'\')">\u2190 '+esc(p.name)+'</button>'+
    '<div class="greet-date">Woche '+pad(V.week)+' \u00b7 '+fmtDate(wk.workout_date)+'</div>'+
    '<h1 class="pg-h">'+esc(curDay.name)+'</h1>'+
    '<div class="slbl"><span>Woche</span></div>'+
    '<div class="chips">'+weeks.map(function(w){return'<button class="chip'+(w===V.week?' on':'')+'" onclick="setWk('+w+')">W'+pad(w)+'</button>'}).join('')+'<button class="chip add" onclick="addWk()">+ Woche</button></div>'+
    '<div class="slbl"><span>Tag</span></div>'+
    '<div class="chips">'+days.map(function(d){return'<button class="chip'+(d.id===V.trackDayId?' on':'')+'" onclick="setTD(\''+d.id+'\')">'+esc(d.name)+'</button>'}).join('')+'</div>'+
    '<div class="prog-big"><div><div class="slbl" style="margin:0 0 6px">Fortschritt</div><div class="prog-num">'+doneS+'<span> / '+totalS+'</span></div></div><div class="prog-meta"><strong>'+pct+'%</strong>erledigt</div></div>'+
    '<div class="prog"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    exs.map(function(ex){
      var sets=byEx[ex.id]||[];
      return'<div class="ex-card"><div class="ex-name">'+esc(ex.name)+'</div><div class="ex-tgt">Ziel \u00b7 '+ex.target_sets+' \u00d7 '+repTxt(ex)+(ex.intensity?' \u00b7 '+esc(ex.intensity):'')+'</div>'+
        '<div class="set-hd"><div>#</div><div>Wdh</div><div>Gewicht</div><div></div></div>'+
        '<div class="set-list">'+sets.map(function(s){
          return'<div class="set-r'+(s.done?' done':'')+'"><div class="set-n">'+pad(s.set_number)+'</div><input class="set-i" type="text" inputmode="numeric" value="'+(s.reps!=null?s.reps:'')+'" placeholder="'+repTxt(ex)+'" onchange="updSet(\''+s.id+'\',\'reps\',this.value)"><input class="set-i" type="text" value="'+esc(s.intensity||'')+'" placeholder="'+(ex.intensity?esc(ex.intensity):'\u2014')+'" onchange="updSet(\''+s.id+'\',\'intensity\',this.value)"><button class="set-chk'+(s.done?' on':'')+'" onclick="togSet(\''+s.id+'\')">'+(s.done?'\u2713':'')+'</button></div>'
        }).join('')+'</div>'+
        '<div class="set-ctrls"><button class="set-ctrl" onclick="addSetR(\''+wk.id+'\',\''+ex.id+'\')">+ Satz</button>'+(sets.length>1?'<button class="set-ctrl" onclick="rmSet(\''+sets[sets.length-1].id+'\')">- Satz</button>':'')+'</div></div>'
    }).join('')+
    '</div>';
}

async function togHab(id){
  var t=today();var existing=(await db.habit_logs.where('log_date').equals(t).toArray()).find(function(l){return l.habit_id===id});

  logFoodId=id;var f=await db.foods.get(id);if(!f){flash('Nicht gefunden',true);return}
  if(!curMeal){var h=new Date().getHours();curMeal=h<11?'breakfast':h<15?'lunch':h<21?'dinner':'snack'}

async function openScan(){
  if(!navigator.mediaDevices){flash('Kamera nicht verf\u00fcgbar',true);return}
  if(!window.ZXingBrowser){flash('Scanner l\u00e4dt noch, versuche es gleich nochmal',true);return}
  flash('Scanner wird ge\u00f6ffnet...');
  try{
    var reader=new window.ZXingBrowser.BrowserMultiFormatReader();
    var video=document.createElement('video');video.setAttribute('playsinline','');video.style.cssText='position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:999';
    var closeBtn=document.createElement('button');closeBtn.textContent='\u00d7';closeBtn.style.cssText='position:fixed;top:60px;left:20px;z-index:1000;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:24px;border:none;cursor:pointer';
    document.body.appendChild(video);document.body.appendChild(closeBtn);
    var controls=await reader.decodeFromConstraints({video:{facingMode:'environment'}},video,async function(result){
      if(result){controls.stop();video.remove();closeBtn.remove();await onBarcode(result.getText())}
    });
    closeBtn.onclick=function(){controls.stop();video.remove();closeBtn.remove()};
  }catch(e){flash('Kamera-Fehler: '+e.message,true)}
}

async function onBarcode(code){
  var all=await db.foods.toArray();var f=all.find(function(x){return x.barcode===code});
  if(f){flash('Gefunden');openLogFood(f.id);return}
  if(!isOnline){flash('Offline - Barcode nicht suchbar',true);return}
  flash('Suche...');
  try{
    var r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+code+'.json?fields=product_name,brands,nutriments,serving_quantity');
    var j=await r.json();
    if(j.status!==1||!j.product){flash('Nicht gefunden',true);openNewFood({barcode:code});return}
    var p=j.product,n=p.nutriments||{};
    f=await ins('foods',{name:p.product_name||'Produkt '+code,brand:p.brands||null,barcode:code,kcal_per_100g:parseFloat(n['energy-kcal_100g'])||0,protein_per_100g:parseFloat(n['proteins_100g'])||0,carbs_per_100g:parseFloat(n['carbohydrates_100g'])||0,fat_per_100g:parseFloat(n['fat_100g'])||0,serving_size_g:parseFloat(p.serving_quantity)||null,source:'openfoodfacts'});
    flash('Gefunden!');openLogFood(f.id);
  }catch(e){flash('Fehler: '+e.message,true);openNewFood({barcode:code})}
}
