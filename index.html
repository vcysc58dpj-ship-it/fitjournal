<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>FitJournal</title>

<style>
  :root {
    --paper: #f5f0e8;
    --paper-2: #efe8dc;
    --paper-3: #e8dfce;
    --paper-4: #ddd1bb;
    --line: #e0d4be;
    --line-2: #cdbfa5;
    --ink: #2d251c;
    --ink-2: #6b5f50;
    --ink-3: #9a8c78;
    --accent: #b85d3e;
    --accent-2: #a04e30;
    --accent-soft: #d89478;
    --accent-bg: #f0d9c8;
    --accent-bg-2: #ead0bd;
    --sage: #7a8a6f;
    --sage-soft: #a8b5a0;
    --sage-bg: #dde2d4;
    --sage-bg-2: #cdd5c2;
    --sand: #c9a876;
    --sand-bg: #ebdcc0;
    --plum: #8a5a7a;
    --plum-bg: #e6d6e0;
    --teal: #5e8a8c;
    --teal-bg: #d6e4e5;
    --error: #b04a3e;
    --error-bg: #f0d4cf;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14.5px;line-height:1.5;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11"}
  body{background:radial-gradient(ellipse 80% 60% at top right,rgba(184,93,62,0.07),transparent 60%),radial-gradient(ellipse 80% 60% at bottom left,rgba(122,138,111,0.06),transparent 60%),var(--paper);padding-bottom:calc(90px + env(safe-area-inset-bottom));overflow-x:hidden;overscroll-behavior-y:none}

button{background:none;border:none;color:inherit;font:inherit;cursor:pointer;padding:0;-webkit-appearance:none;appearance:none}
input,select,textarea{font:inherit;color:var(–ink);-webkit-appearance:none;appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.shell{max-width:460px;margin:0 auto;padding:18px 18px 32px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.header-l{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(–accent),var(–accent-2));display:flex;align-items:center;justify-content:center;color:var(–paper);font-family:‘Geist’,sans-serif;font-size:17px;font-weight:700;line-height:1;letter-spacing:-0.02em;box-shadow:0 2px 8px rgba(184,93,62,0.25)}
.header-name{font-size:15px;font-weight:600;color:var(–ink);letter-spacing:-0.01em}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(–paper-2);border:1px solid var(–line);color:var(–ink-2);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:active{background:var(–paper-3);color:var(–ink)}
.icon-btn svg{width:17px;height:17px;stroke-width:1.7;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-family:‘JetBrains Mono’,monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;background:var(–paper-2);color:var(–ink-2);border:1px solid var(–line)}
.badge.online{color:var(–sage);background:var(–sage-bg);border-color:rgba(122,138,111,0.25)}
.badge.offline{color:var(–accent);background:var(–accent-bg);border-color:rgba(184,93,62,0.2)}

/* Greeting */
.greeting{margin-bottom:28px}
.date-line{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:500;color:var(–ink-3);letter-spacing:0.05em;text-transform:uppercase}
.date-line::before{content:’’;width:14px;height:1px;background:var(–accent);opacity:0.6}
.greeting-h{font-family:‘Geist’,sans-serif;font-weight:500;font-size:clamp(34px,9vw,44px);line-height:1.02;letter-spacing:-0.04em;color:var(–ink)}
.greeting-h .name{color:var(–accent);font-weight:600}
.greeting-sub{margin-top:12px;font-size:14px;line-height:1.55;color:var(–ink-2);max-width:95%}

/* Section labels */
.section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:28px}
.section-label-text{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(–ink-2)}
.section-label-count{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:500;color:var(–ink-3);letter-spacing:0.06em}

/* Stat hero card - the calorie one */
.stat-hero{background:linear-gradient(135deg,var(–accent-bg) 0%,var(–accent-bg-2) 100%);border:1px solid rgba(184,93,62,0.22);border-radius:18px;padding:18px 20px;margin-bottom:10px;position:relative;overflow:hidden}
.stat-hero::before{content:’’;position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(184,93,62,0.15),transparent 70%);pointer-events:none}
.stat-hero-row{display:flex;justify-content:space-between;align-items:flex-start;position:relative}
.stat-hero-l{flex:1}
.stat-hero-label{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px}
.stat-hero-num{font-family:‘Geist’,sans-serif;font-weight:600;font-size:42px;line-height:0.95;letter-spacing:-0.04em;color:var(–ink)}
.stat-hero-num small{font-family:‘Geist’,sans-serif;font-size:16px;color:var(–accent);font-weight:500;margin-left:4px;letter-spacing:0}
.stat-hero-detail{font-size:13px;color:var(–ink-2);margin-top:8px;font-weight:450}
.stat-hero-icon{width:38px;height:38px;border-radius:11px;background:var(–accent);color:var(–paper);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(184,93,62,0.3)}
.stat-hero-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.stat-hero-bar{margin-top:14px;height:5px;background:rgba(184,93,62,0.15);border-radius:100px;overflow:hidden;position:relative}
.stat-hero-bar-fill{height:100%;background:linear-gradient(90deg,var(–accent),var(–accent-2));border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(184,93,62,0.4)}

/* Mini stats grid */
.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.mini-stat{background:var(–paper-2);border:1px solid var(–line);border-radius:14px;padding:14px 12px;text-align:left;position:relative;transition:all 0.15s}
.mini-stat:active{background:var(–paper-3);transform:scale(0.98)}
.mini-stat-icon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.mini-stat-icon svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.mini-stat.habits .mini-stat-icon{background:var(–sage-bg);color:var(–sage)}
.mini-stat.water .mini-stat-icon{background:var(–teal-bg);color:var(–teal)}
.mini-stat.weight .mini-stat-icon{background:var(–plum-bg);color:var(–plum)}
.mini-stat-label{font-family:‘JetBrains Mono’,monospace;font-size:9px;font-weight:600;color:var(–ink-3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.mini-stat-num{font-family:‘Geist’,sans-serif;font-weight:600;font-size:20px;line-height:1;letter-spacing:-0.03em;color:var(–ink)}
.mini-stat-num small{font-family:‘Geist’,sans-serif;font-size:11px;color:var(–ink-3);font-weight:400;margin-left:2px}
.mini-stat-bar{margin-top:8px;height:3px;background:rgba(45,37,28,0.08);border-radius:100px;overflow:hidden}
.mini-stat-bar div{height:100%;border-radius:100px}
.mini-stat.habits .mini-stat-bar div{background:var(–sage)}
.mini-stat.water .mini-stat-bar div{background:var(–teal)}
.mini-stat.weight .mini-stat-bar div{background:var(–plum)}

/* Module grid - bigger, more visual */
.modules{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.module{background:var(–paper-2);border:1px solid var(–line);border-radius:14px;padding:16px 14px;text-align:left;transition:all 0.15s;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:108px}
.module:active{background:var(–paper-3);transform:scale(0.98)}
.module.full{grid-column:span 2}
.module-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.module-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.module-icon svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.module.training .module-icon{background:var(–accent-bg);color:var(–accent)}
.module.habits .module-icon{background:var(–sage-bg);color:var(–sage)}
.module.nutrition .module-icon{background:var(–sand-bg);color:#a07d3a}
.module.weight .module-icon{background:var(–plum-bg);color:var(–plum)}
.module.mood .module-icon{background:var(–teal-bg);color:var(–teal)}
.module.stats .module-icon{background:var(–paper-3);color:var(–ink-2)}
.module-stat-pill{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–ink-2);background:var(–paper);padding:3px 8px;border-radius:6px;border:1px solid var(–line)}
.module-name{font-size:15px;font-weight:600;color:var(–ink);letter-spacing:-0.015em;margin-bottom:2px}
.module-meta{font-size:11.5px;color:var(–ink-3);line-height:1.35;flex:1}
.module-arrow{font-family:‘Geist’,sans-serif;color:var(–ink-3);font-size:14px;font-weight:500;margin-top:6px;align-self:flex-end}

/* Quote / reminder card with sage accent */
.quote-card{margin-top:24px;background:linear-gradient(135deg,var(–sage-bg),var(–sage-bg-2));border:1px solid rgba(122,138,111,0.25);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.quote-card::before{content:’’;position:absolute;top:-20px;left:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(122,138,111,0.15),transparent 70%);pointer-events:none}
.quote-mark{font-family:‘Geist’,sans-serif;font-weight:700;font-size:38px;line-height:0.4;color:var(–sage);opacity:0.6;margin-bottom:10px;position:relative}
.quote-text{font-size:15px;line-height:1.55;color:var(–ink);letter-spacing:-0.005em;position:relative;font-weight:450}
.quote-attr{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–sage);letter-spacing:0.12em;text-transform:uppercase;margin-top:14px;position:relative}

/* Page header */
.back-link{display:inline-flex;align-items:center;gap:6px;margin-bottom:18px;font-size:13px;color:var(–ink-2);padding:7px 12px 7px 8px;border-radius:8px;font-weight:500;transition:background 0.15s;background:var(–paper-2);border:1px solid var(–line)}
.back-link:active{background:var(–paper-3)}
.back-link::before{content:‘←’;font-weight:400;font-size:14px}
.page-h{font-family:‘Geist’,sans-serif;font-weight:600;font-size:32px;line-height:1.05;letter-spacing:-0.04em;color:var(–ink);margin-bottom:6px}
.page-h .accent{color:var(–accent)}
.page-sub{font-size:13px;color:var(–ink-3);margin-bottom:22px}

/* Inputs */
.input{width:100%;background:var(–paper-2);border:1.5px solid var(–line);border-radius:11px;padding:13px 14px;color:var(–ink);outline:none;font-size:15px;font-family:‘Geist’,sans-serif;font-weight:400;transition:all 0.15s}
.input:focus{border-color:var(–accent);background:var(–paper);box-shadow:0 0 0 3px rgba(184,93,62,0.1)}
.input::placeholder{color:var(–ink-3)}
.input.num{font-family:‘JetBrains Mono’,monospace;font-weight:500;letter-spacing:0.01em}
.input-label{display:block;margin-bottom:8px;font-size:12px;font-weight:500;color:var(–ink-2)}
.field{margin-bottom:16px}
.field-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Add bar - prominent */
.add-bar{display:flex;gap:6px;background:var(–paper-2);border:1.5px solid var(–line);border-radius:12px;padding:5px;margin-bottom:14px;transition:all 0.15s}
.add-bar:focus-within{border-color:var(–accent);background:var(–paper);box-shadow:0 0 0 3px rgba(184,93,62,0.1)}
.add-bar input{flex:1;background:none;border:none;outline:none;padding:10px 12px;font-size:15px;color:var(–ink);font-family:‘Geist’,sans-serif;min-width:0}
.add-bar input::placeholder{color:var(–ink-3)}
.add-btn{background:linear-gradient(135deg,var(–accent),var(–accent-2));color:var(–paper);width:38px;height:38px;border-radius:9px;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;box-shadow:0 2px 6px rgba(184,93,62,0.3);font-weight:400}
.add-btn:active{transform:scale(0.94)}

/* Buttons */
.btn{padding:12px 18px;border-radius:11px;font-size:14px;font-weight:500;background:var(–paper-2);border:1.5px solid var(–line);color:var(–ink);transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:‘Geist’,sans-serif}
.btn:active{background:var(–paper-3);transform:scale(0.98)}
.btn.primary{background:linear-gradient(135deg,var(–accent),var(–accent-2));border-color:var(–accent-2);color:var(–paper);box-shadow:0 2px 8px rgba(184,93,62,0.25);font-weight:600}
.btn.primary:active{box-shadow:0 1px 4px rgba(184,93,62,0.2)}
.btn.dark{background:var(–ink);border-color:var(–ink);color:var(–paper)}
.btn.danger{color:var(–error);background:var(–error-bg);border-color:rgba(176,74,62,0.25)}
.btn.full{width:100%}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* CTA banner */
.cta{background:linear-gradient(135deg,var(–accent-bg),var(–accent-bg-2));border:1.5px solid rgba(184,93,62,0.22);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;width:100%;transition:all 0.15s}
.cta:active{transform:scale(0.99)}
.cta-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(–accent),var(–accent-2));color:var(–paper);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(184,93,62,0.3)}
.cta-icon svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.cta-body{flex:1;min-width:0}
.cta-pre{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px}
.cta-h{font-family:‘Geist’,sans-serif;font-size:17px;font-weight:600;color:var(–ink);letter-spacing:-0.025em;line-height:1.05}
.cta-arrow{color:var(–accent);font-size:20px;font-weight:500}

/* List rows */
.row{background:var(–paper-2);border:1px solid var(–line);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;text-align:left;width:100%}
.row:active{background:var(–paper-3)}
.row-num{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:600;color:var(–ink-3);width:22px;flex-shrink:0;letter-spacing:0.04em}
.row-body{flex:1;min-width:0}
.row-title{font-size:15px;font-weight:500;color:var(–ink);letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-sub{font-size:12px;color:var(–ink-3);margin-top:2px}
.row-arrow{color:var(–ink-3);font-size:14px}
.row-del{color:var(–ink-3);font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;line-height:1}
.row-del:active{color:var(–error);background:var(–error-bg)}

.empty-card{background:var(–paper-2);border:1.5px dashed var(–line-2);border-radius:14px;padding:30px 20px;text-align:center}
.empty-icon{font-family:‘Geist’,sans-serif;font-weight:300;font-size:32px;color:var(–ink-3);line-height:1}
.empty-text{font-size:13px;color:var(–ink-2);margin-top:12px;line-height:1.5}

/* Chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:9px 14px;border-radius:10px;background:var(–paper-2);border:1px solid var(–line);color:var(–ink-2);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;font-family:‘Geist’,sans-serif}
.chip.active{background:var(–ink);border-color:var(–ink);color:var(–paper)}
.chip.add{border-style:dashed;color:var(–ink-3)}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(245,240,232,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(–line);padding:8px 16px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:50}
.nav-btn{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(–ink-3);transition:all 0.15s;background:none;border:none}
.nav-btn.active{background:linear-gradient(135deg,var(–accent),var(–accent-2));color:var(–paper);box-shadow:0 2px 8px rgba(184,93,62,0.3)}
.nav-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(45,37,28,0.55);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-backdrop.open{opacity:1;pointer-events:auto}
.modal{background:var(–paper);border:1px solid var(–line);border-radius:20px 20px 0 0;max-width:520px;width:100%;padding:24px 20px calc(28px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.2,.7,.2,1)}
@media(min-width:540px){.modal-backdrop{align-items:center;padding:20px}.modal{border-radius:20px;transform:translateY(20px) scale(0.96)}}
.modal-backdrop.open .modal{transform:translateY(0) scale(1)}
.modal-handle{width:36px;height:4px;background:var(–line-2);border-radius:2px;margin:-8px auto 16px}
.modal-title{font-family:‘Geist’,sans-serif;font-weight:600;font-size:24px;line-height:1.1;letter-spacing:-0.03em;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(–ink-3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(–line)}
.modal-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.modal-actions .btn{flex:1;min-width:90px}

/* Toast */
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);background:var(–ink);color:var(–paper);font-size:13px;font-weight:500;padding:11px 20px;border-radius:100px;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:300;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(45,37,28,0.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast::before{content:’’;width:6px;height:6px;border-radius:50%;background:var(–sage-soft)}
.toast.error::before{background:var(–accent-soft)}

/* Onboarding */
.ob-shell{max-width:440px;margin:0 auto;padding:28px 20px calc(40px + env(safe-area-inset-bottom));min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.ob-progress{display:flex;gap:5px;margin-bottom:28px}
.ob-step-bar{flex:1;height:4px;background:var(–paper-3);border-radius:2px;overflow:hidden;transition:background 0.3s}
.ob-step-bar.done{background:var(–accent)}
.ob-step-bar.current{background:var(–accent);box-shadow:0 0 8px rgba(184,93,62,0.3)}
.ob-step-num{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–ink-3);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:14px}
.ob-question{font-family:‘Geist’,sans-serif;font-weight:600;font-size:30px;line-height:1.05;letter-spacing:-0.04em;margin-bottom:10px;color:var(–ink)}
.ob-question .accent{color:var(–accent)}
.ob-helper{font-size:14.5px;color:var(–ink-2);margin-bottom:24px;line-height:1.55}
.ob-options{display:grid;gap:8px;margin-bottom:20px}
.ob-option{padding:15px 18px;border-radius:12px;background:var(–paper-2);border:1.5px solid var(–line);text-align:left;display:flex;justify-content:space-between;align-items:center;gap:14px;width:100%;font-family:‘Geist’,sans-serif;color:var(–ink);transition:all 0.15s}
.ob-option:active{background:var(–paper-3)}
.ob-option.selected{border-color:var(–accent);background:var(–accent-bg);box-shadow:0 0 0 3px rgba(184,93,62,0.08)}
.ob-option-title{font-size:15px;font-weight:600;letter-spacing:-0.01em;color:var(–ink)}
.ob-option-sub{font-size:12px;color:var(–ink-2);margin-top:2px;font-weight:400}
.ob-option-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(–line-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(–paper);transition:all 0.15s}
.ob-option.selected .ob-option-check{background:var(–accent);border-color:var(–accent)}
.ob-option.selected .ob-option-check::after{content:‘✓’;color:var(–paper);font-size:13px;font-weight:700}
.ob-actions{margin-top:auto;padding-top:20px;display:flex;gap:8px}
.ob-actions .btn{flex:1}
.ob-rec-tag{font-family:‘JetBrains Mono’,monospace;font-size:9px;color:var(–accent);background:var(–accent-bg);padding:2px 7px;border-radius:5px;margin-left:8px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;display:inline-block;vertical-align:middle}
.ob-rec-tag.support{color:var(–teal);background:var(–teal-bg)}

/* Auth */
.auth-screen{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:400px}
.auth-logo-wrap{display:flex;justify-content:center;margin-bottom:20px}
.auth-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(–accent),var(–accent-2));display:flex;align-items:center;justify-content:center;color:var(–paper);font-size:22px;font-weight:700;letter-spacing:-0.02em;box-shadow:0 4px 16px rgba(184,93,62,0.35)}
.auth-h{font-family:‘Geist’,sans-serif;font-weight:600;font-size:40px;line-height:1;letter-spacing:-0.04em;text-align:center;color:var(–ink)}
.auth-h .accent{color:var(–accent)}
.auth-sub{text-align:center;font-size:14px;color:var(–ink-2);margin-top:10px;margin-bottom:28px}
.auth-form{background:var(–paper-2);border:1px solid var(–line);border-radius:16px;padding:22px}
.auth-error{background:var(–error-bg);border:1px solid rgba(176,74,62,0.25);color:var(–error);padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;font-weight:500}
.auth-toggle{text-align:center;margin-top:20px;font-size:13px;color:var(–ink-2)}
.auth-toggle button{color:var(–accent);font-weight:600;text-decoration:underline;text-decoration-color:rgba(184,93,62,0.3);text-underline-offset:3px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(–ink-3);font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.2em}

/* ─── Training tracking ─── */
.ex-card{background:var(–paper-2);border:1px solid var(–line);border-radius:14px;padding:18px;margin-bottom:12px}
.ex-name{font-family:‘Geist’,sans-serif;font-size:18px;font-weight:600;letter-spacing:-0.025em;color:var(–ink)}
.ex-target{font-family:‘JetBrains Mono’,monospace;font-size:11px;color:var(–ink-3);margin-bottom:14px;letter-spacing:0.05em;font-weight:500}
.last-session{background:var(–accent-bg);border:1px solid rgba(184,93,62,0.18);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(–ink-2)}
.last-session-label{font-family:‘JetBrains Mono’,monospace;font-size:9px;font-weight:600;color:var(–accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px}
.last-session strong{color:var(–ink);font-family:‘JetBrains Mono’,monospace;font-weight:600}
.last-session.empty{background:var(–paper-3);border-color:var(–line)}
.last-session.empty .last-session-label{color:var(–ink-3)}
.set-col-head{display:grid;grid-template-columns:24px 1fr 1fr 36px;gap:8px;padding:0 12px 6px;font-family:‘JetBrains Mono’,monospace;font-size:9px;font-weight:600;color:var(–ink-3);text-transform:uppercase;letter-spacing:0.1em}
.set-col-head div:nth-child(2),.set-col-head div:nth-child(3){text-align:center}
.set-list{display:grid;gap:6px}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 36px;gap:8px;align-items:center;padding:10px 12px;background:var(–paper);border:1px solid var(–line);border-radius:10px;transition:all 0.15s}
.set-row.done{background:var(–sage-bg);border-color:rgba(122,138,111,0.3)}
.set-row-num{font-family:‘JetBrains Mono’,monospace;font-size:11px;color:var(–ink-3);font-weight:600}
.set-row.done .set-row-num{color:var(–sage)}
.set-input{background:transparent;border:none;padding:4px 0;font-family:‘JetBrains Mono’,monospace;font-size:14px;color:var(–ink);outline:none;text-align:center;width:100%;font-weight:600}
.set-input::placeholder{color:var(–ink-3);font-family:‘Geist’,sans-serif;font-style:normal;font-weight:400}
.set-check{width:28px;height:28px;border-radius:8px;border:1.5px solid var(–line-2);background:var(–paper);display:flex;align-items:center;justify-content:center;cursor:pointer}
.set-check.on{background:var(–sage);border-color:var(–sage)}
.set-check.on::after{content:‘✓’;color:var(–paper);font-size:14px;font-weight:700}
.set-controls{display:flex;gap:6px;margin-top:12px}
.set-ctrl{padding:7px 12px;background:var(–paper);border:1px solid var(–line);border-radius:8px;color:var(–ink-2);font-size:12px;font-family:‘Geist’,sans-serif;font-weight:500}

.progress-big{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-big-num{font-family:‘Geist’,sans-serif;font-weight:600;font-size:30px;line-height:1;letter-spacing:-0.04em;color:var(–ink)}
.progress-big-num span{color:var(–ink-3);font-weight:400}
.progress-big-meta{font-family:‘JetBrains Mono’,monospace;font-size:11px;color:var(–ink-3);letter-spacing:0.06em;text-align:right;font-weight:500}
.progress-big-meta strong{color:var(–accent);font-weight:700;font-size:14px;display:block}
.progress{height:5px;background:var(–paper-3);border-radius:100px;overflow:hidden;margin-bottom:24px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–sage),#5e7754);border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Habits */
.habit-card{background:var(–paper-2);border:1px solid var(–line);border-radius:14px;padding:16px;margin-bottom:10px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
.habit-name{font-size:15px;font-weight:600;color:var(–ink);letter-spacing:-0.01em}
.habit-streak{font-size:11px;color:var(–ink-3);margin-top:4px;font-family:‘JetBrains Mono’,monospace;letter-spacing:0.05em;font-weight:500}
.habit-streak strong{color:var(–accent);font-weight:700}
.habit-heatmap{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;margin-top:10px;max-width:240px}
.heat-cell{aspect-ratio:1;background:var(–paper-3);border-radius:2px}
.heat-cell.on{background:var(–sage)}
.heat-cell.today{outline:1.5px solid var(–ink);outline-offset:1px}
.habit-check{width:46px;height:46px;border-radius:12px;border:1.5px solid var(–line-2);background:var(–paper);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;cursor:pointer}
.habit-check.on{background:var(–sage);border-color:var(–sage);box-shadow:0 2px 8px rgba(122,138,111,0.35)}
.habit-check.on::after{content:‘✓’;color:var(–paper);font-size:22px;font-weight:700}
.habit-side{display:flex;flex-direction:column;gap:6px;align-items:center}

/* Nutrition */
.nut-hero{background:linear-gradient(135deg,var(–accent-bg),var(–accent-bg-2));border:1px solid rgba(184,93,62,0.22);border-radius:16px;padding:20px 18px;margin-bottom:12px;position:relative;overflow:hidden}
.nut-hero::before{content:’’;position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(184,93,62,0.18),transparent 70%);pointer-events:none}
.nut-hero-grid{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;position:relative}
.nut-hero-eyebrow{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(–accent);margin-bottom:8px}
.nut-hero-num{font-family:‘Geist’,sans-serif;font-weight:600;font-size:42px;line-height:0.95;letter-spacing:-0.04em;color:var(–ink)}
.nut-hero-num small{font-family:‘Geist’,sans-serif;font-size:16px;color:var(–accent);font-weight:500;margin-left:4px;letter-spacing:0}
.nut-hero-label{font-size:13px;color:var(–ink-2);margin-top:8px;font-weight:450}
.donut{width:84px;height:84px;position:relative}
.donut svg{transform:rotate(-90deg)}
.donut-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-family:‘Geist’,sans-serif;font-weight:700;font-size:20px;line-height:1;color:var(–ink);letter-spacing:-0.03em}
.donut-lbl{font-family:‘JetBrains Mono’,monospace;font-size:8px;font-weight:600;color:var(–ink-3);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}

.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.macro{background:var(–paper-2);border:1px solid var(–line);border-radius:12px;padding:13px 12px}
.macro-lbl{font-family:‘JetBrains Mono’,monospace;font-size:9px;font-weight:600;color:var(–ink-2);margin-bottom:6px;letter-spacing:0.1em;text-transform:uppercase}
.macro-num{font-family:‘Geist’,sans-serif;font-weight:600;font-size:18px;line-height:1;color:var(–ink);letter-spacing:-0.025em}
.macro-num small{font-family:‘Geist’,sans-serif;font-size:11px;color:var(–ink-3);font-weight:400;margin-left:1px}
.macro-bar{height:3px;background:rgba(45,37,28,0.08);border-radius:100px;margin-top:8px;overflow:hidden}
.macro-bar div{height:100%;border-radius:100px}
.macro:nth-child(1) .macro-bar div{background:var(–accent)}
.macro:nth-child(2) .macro-bar div{background:var(–sand)}
.macro:nth-child(3) .macro-bar div{background:var(–sage)}

/* Search */
.search{background:var(–paper-2);border:1.5px solid var(–line);border-radius:12px;padding:5px;display:flex;gap:5px;align-items:center;margin-bottom:10px;transition:all 0.15s}
.search:focus-within{border-color:var(–accent);background:var(–paper);box-shadow:0 0 0 3px rgba(184,93,62,0.1)}
.search-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(–ink-3);flex-shrink:0}
.search-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round}
.search-input{flex:1;background:none;border:none;outline:none;padding:10px 4px;font-size:15px;color:var(–ink);font-family:‘Geist’,sans-serif;min-width:0}
.search-input::placeholder{color:var(–ink-3)}
.scan-btn{background:var(–ink);color:var(–paper);width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s}
.scan-btn:active{opacity:0.85}
.scan-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.quick-act{background:var(–paper-2);border:1.5px solid var(–line);border-radius:11px;padding:11px 14px;font-size:13px;color:var(–ink);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;font-family:‘Geist’,sans-serif}
.quick-act:active{background:var(–paper-3)}

.meal{background:var(–paper-2);border:1px solid var(–line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.meal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(–line)}
.meal-name{font-family:‘Geist’,sans-serif;font-size:17px;font-weight:600;color:var(–ink);letter-spacing:-0.025em}
.meal-meta{display:flex;align-items:center;gap:10px}
.meal-kcal{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:500;color:var(–ink-2);letter-spacing:0.04em}
.meal-kcal strong{color:var(–ink);font-weight:700}
.meal-add{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(–accent),var(–accent-2));border:none;color:var(–paper);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:400;line-height:1;cursor:pointer;box-shadow:0 2px 6px rgba(184,93,62,0.3)}
.meal-add:active{transform:scale(0.92)}
.frow{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:11px 14px;align-items:center;border-bottom:1px solid var(–line)}
.frow:last-child{border-bottom:none}
.fname{font-size:13.5px;font-weight:500;color:var(–ink);letter-spacing:-0.005em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fmeta{font-family:‘JetBrains Mono’,monospace;font-size:9.5px;color:var(–ink-3);margin-top:2px;letter-spacing:0.03em;font-weight:500}
.fkcal{font-family:‘Geist’,sans-serif;font-weight:600;font-size:15px;color:var(–ink);letter-spacing:-0.02em;text-align:right}
.fkcal small{font-family:‘Geist’,sans-serif;font-size:9px;color:var(–ink-3);margin-left:2px;display:block;margin-top:-2px;font-weight:400}
.meal-empty{padding:18px 16px;text-align:center;color:var(–ink-3);font-size:13px}
.frow-del{padding:8px;color:var(–ink-3);font-size:16px;line-height:1;border-radius:6px;background:none;border:none;cursor:pointer}
.frow-del:active{background:var(–error-bg);color:var(–error)}

/* Water */
.water-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;background:var(–paper-2);border:1px solid var(–line);border-radius:14px;padding:14px;margin-bottom:14px}
.water-amount{font-family:‘Geist’,sans-serif;font-weight:600;font-size:24px;letter-spacing:-0.03em;color:var(–ink)}
.water-amount span{font-size:13px;color:var(–ink-3);font-weight:400;margin-left:4px}
.water-btn{width:42px;height:42px;border-radius:10px;background:var(–teal-bg);border:1px solid rgba(94,138,140,0.3);color:var(–teal);font-size:12px;font-family:‘JetBrains Mono’,monospace;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
.water-btn:active{background:var(–teal);color:var(–paper)}

/* Mood / Journal */
.mood-hero{background:linear-gradient(135deg,var(–teal-bg),#cdd9d8);border:1px solid rgba(94,138,140,0.25);border-radius:16px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.mood-hero::before{content:’’;position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(94,138,140,0.18),transparent 70%);pointer-events:none}
.mood-hero-eyebrow{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(–teal);margin-bottom:10px;position:relative}
.mood-hero-q{font-family:‘Geist’,sans-serif;font-weight:600;font-size:22px;line-height:1.15;letter-spacing:-0.025em;color:var(–ink);margin-bottom:14px;position:relative}
.mood-scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;position:relative}
.mood-btn{aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,0.5);border:1.5px solid rgba(94,138,140,0.2);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.mood-btn:active{transform:scale(0.94)}
.mood-btn.selected{background:var(–teal);border-color:var(–teal);box-shadow:0 4px 12px rgba(94,138,140,0.35)}
.mood-entry-card{background:var(–paper-2);border:1px solid var(–line);border-radius:12px;padding:14px;margin-bottom:8px}
.mood-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mood-entry-emoji{font-size:24px;line-height:1}
.mood-entry-time{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–ink-3);letter-spacing:0.06em}
.mood-entry-trigger{display:inline-block;font-family:‘JetBrains Mono’,monospace;font-size:10px;color:var(–accent);background:var(–accent-bg);padding:2px 8px;border-radius:5px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;margin-top:4px}
.mood-entry-trigger.craving{color:var(–plum);background:var(–plum-bg)}
.mood-entry-notes{font-size:13px;color:var(–ink-2);margin-top:8px;line-height:1.45}

/* Weight */
.weight-hero{background:linear-gradient(135deg,var(–plum-bg),#dec6d6);border:1px solid rgba(138,90,122,0.25);border-radius:16px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.weight-hero::before{content:’’;position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(138,90,122,0.18),transparent 70%);pointer-events:none}
.weight-big{font-family:‘Geist’,sans-serif;font-weight:600;font-size:60px;line-height:0.9;letter-spacing:-0.05em;color:var(–ink);position:relative}
.weight-big span{font-family:‘Geist’,sans-serif;font-size:18px;color:var(–plum);margin-left:6px;font-weight:500;letter-spacing:0}
.weight-delta-row{display:flex;gap:18px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(138,90,122,0.18);position:relative}
.weight-delta-item{flex:1}
.weight-delta-label{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–plum);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.weight-delta-val{font-family:‘Geist’,sans-serif;font-weight:600;font-size:20px;line-height:1;letter-spacing:-0.03em;color:var(–ink)}
.weight-delta-val.down{color:var(–sage)}
.weight-delta-val.up{color:var(–accent)}

/* Charts */
.chart-card{background:var(–paper-2);border:1px solid var(–line);border-radius:14px;padding:18px;margin-bottom:12px}
.chart-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.chart-title{font-size:15px;font-weight:600;color:var(–ink);letter-spacing:-0.015em}
.chart-sub{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:500;color:var(–ink-3);letter-spacing:0.05em}
svg.chart{display:block;width:100%;height:180px}
svg.chart text{font-family:‘JetBrains Mono’,monospace;font-size:9px;fill:var(–ink-3);font-weight:500}
svg.chart .grid{stroke:var(–line);stroke-width:1;stroke-dasharray:2 4}
svg.chart .line{fill:none;stroke:var(–accent);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}
svg.chart .line-2{fill:none;stroke:var(–sage);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
svg.chart .dot{fill:var(–accent)}
svg.chart .dot-2{fill:var(–sage)}
svg.chart .bar{fill:var(–accent);opacity:0.85}
svg.chart .bar.under{fill:var(–paper-3);opacity:1}
svg.chart .target-line{stroke:var(–ink-3);stroke-width:1;stroke-dasharray:4 4;fill:none}

/* Scanner */
.scanner-wrap{position:fixed;inset:0;background:#000;z-index:400;display:flex;flex-direction:column}
.scanner-video{flex:1;position:relative;overflow:hidden}
.scanner-video video{width:100%;height:100%;object-fit:cover}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scanner-frame{width:75%;max-width:300px;aspect-ratio:1.5;border:2px solid var(–accent);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,0.55)}

/* Outbox */
async function enqueue(table, op, payload) {
  await ldb.outbox.add({ table, op, payload, created_at: Date.now(), attempts: 0 });
  if (isOnline) trySyncOutbox();
}
let syncing = false;
async function trySyncOutbox() {
  if (syncing || !isOnline || !userId) return;
  syncing = true;
  try {
    const items = await ldb.outbox.orderBy('id').toArray();
    for (const item of items) {
      try {
        let res;
        if (item.op === 'insert')      res = await sb.from(item.table).insert(item.payload);
        else if (item.op === 'update') res = await sb.from(item.table).update(item.payload).eq('id', item.payload.id);
        else if (item.op === 'upsert') res = await sb.from(item.table).upsert(item.payload);
        else if (item.op === 'delete') res = await sb.from(item.table).delete().eq('id', item.payload.id);
        if (res && res.error) throw res.error;
        await ldb.outbox.delete(item.id);
      } catch (e) {
        console.warn('Sync failed:', item.table, item.op, e);
        await ldb.outbox.update(item.id, { attempts: item.attempts + 1, last_error: e.message });
        break;
      }
    }
  } finally {
    syncing = false;
  }
}

async function dbInsert(table, row) {
  if (!row.id) row.id = uid();
  if (!row.user_id) row.user_id = userId;
  if (!row.created_at) row.created_at = new Date().toISOString();
  if (!row.updated_at) row.updated_at = new Date().toISOString();
  await ldb[table].put(row);
  await enqueue(table, 'insert', row);
  return row;
}
async function dbUpdate(table, id, patch) {
  const existing = await ldb[table].get(id);
  if (!existing) return null;
  const updated = { ...existing, ...patch, updated_at: new Date().toISOString() };
  await ldb[table].put(updated);
  await enqueue(table, 'update', updated);
  return updated;
}
async function dbDelete(table, id) {
  await ldb[table].delete(id);
  await enqueue(table, 'delete', { id });
}

async function pullAll() {
  if (!isOnline || !userId) return;
  const tables = ['training_plans','training_days','exercises','workouts','workout_sets','habits','habit_logs','foods','food_entries','recipes','recipe_items','water_logs','weights','mood_entries'];
  const localTableMap = { training_plans:'plans', training_days:'days', exercises:'exercises', workouts:'workouts', workout_sets:'workout_sets', habits:'habits', habit_logs:'habit_logs', foods:'foods', food_entries:'food_entries', recipes:'recipes', recipe_items:'recipe_items', water_logs:'water_logs', weights:'weights', mood_entries:'mood_entries' };
  try {
    const { data: prof, error: profErr } = await sb.from('profiles').select('*').eq('id', userId).single();
    if (prof && !profErr) { profile = prof; await ldb.profile.put({ id: userId, ...prof }); }
    for (const t of tables) {
      try {
        const { data, error } = await sb.from(t).select('*');
        if (error) { console.warn('Pull skip', t, error.message); continue; }
        const localTable = localTableMap[t];
        if (!ldb[localTable]) { console.warn('No local table:', localTable); continue; }
        await ldb[localTable].clear();
        if (data && data.length) await ldb[localTable].bulkPut(data);
      } catch (e2) {
        console.warn('Pull failed for', t, e2.message);
      }
    }
  } catch (e) { console.error('pullAll failed', e); }
}

/* Boot */
async function boot() {
  const dbg = (msg) => { console.log('[FJ]', msg); const el = document.getElementById('app'); if (el && el.querySelector('.loading')) el.innerHTML = `<div class="loading">${esc(msg)}</div>`; };
  try {
    dbg('Verbinde mit Supabase…');
    const { data, error: sessErr } = await sb.auth.getSession();
    if (sessErr) throw sessErr;
    dbg('Session geladen');
    await onSession(data.session);
    sb.auth.onAuthStateChange(async (_e, newSess) => { await onSession(newSess); });
  } catch (e) {
    console.error('Boot failed:', e);
    $app.innerHTML = `<div style="padding:40px 20px;text-align:center;max-width:400px;margin:0 auto"><div class="auth-error" style="margin-bottom:16px">Fehler beim Start:<br>${esc(e.message)}</div><button class="btn primary full" onclick="location.reload()">Neu laden</button><p style="margin-top:20px;font-size:11px;color:var(--ink-3);font-family:monospace;word-break:break-all">${esc(String(e.stack || e))}</p></div>`;
  }
}
async function onSession(sess) {
  session = sess;
  userId = sess?.user?.id || null;
  if (!userId) {
    view.screen = 'auth';
    profile = null;
    render();
    return;
  }
  const cachedProf = await ldb.profile.get(userId);
  if (cachedProf) profile = cachedProf;
  await pullAll();
  await trySyncOutbox();
  if (!profile || !profile.onboarding_completed) view.screen = 'onboarding';
  else view.screen = 'home';
  render();
}

async function handleAuth(e) {
  e.preventDefault();

  const renderers = [obStepWelcome, obStepBasics, obStepBody, obStepGoal, obStepActivity, obStepExperience, obStepEmotional, obStepHabits];
  $app.innerHTML = `
    <div class="ob-shell fade-in">
      <div class="ob-progress">
        ${Array.from({length: TOTAL_STEPS}, (_, i) => `<div class="ob-step-bar ${i < ob.step ? 'done' : ''} ${i === ob.step ? 'current' : ''}"></div>`).join('')}
      </div>
      <div class="ob-step-num">Schritt ${ob.step + 1} von ${TOTAL_STEPS}</div>

  `;
}

function obStepHabits() {
  const exp = ob.data.experience || 'beginner';
  const ee = ob.data.emotional_eating || 'never';

  let recommended = exp === 'beginner'
    ? ['water_morning','walk_10min','log_meals']
    : exp === 'intermediate'
    ? ['water_2l','walk_steps','log_meals','protein_meal','sleep_7h']
    : ['water_2l','log_meals','protein_meal','sleep_7h','stretch_5min'];

  if (ee === 'often') {
    recommended = recommended.concat(['mood_check','pre_meal_pause','craving_journal','mindful_eating','self_compassion']);
  } else if (ee === 'sometimes') {
    recommended = recommended.concat(['mood_check','pre_meal_pause','mindful_eating']);
  }

  if (!ob._habitsInited) {
    ob.data.selected_habits = [...recommended];
    ob._habitsInited = true;
  }

  // Sort: support habits first if user has emotional eating concerns
  let sortedLib = [...HABIT_LIBRARY];
  if (ee !== 'never') {
    sortedLib.sort((a, b) => {
      if (a.tag === 'support' && b.tag !== 'support') return -1;
      if (b.tag === 'support' && a.tag !== 'support') return 1;
      return 0;
    });
  }

  return `
    <h1 class="ob-question">Wähle deine <span class="accent">Habits.</span></h1>
    <p class="ob-helper">${ee === 'often' ? 'Wir haben Habits ausgewählt, die dir bei emotionalen Essmustern helfen können.' : ee === 'sometimes' ? 'Ein paar achtsame Habits können in stressigen Momenten helfen.' : 'Klein anfangen, groß werden. Für den Start reichen 3–5 Habits.'}</p>
    <div class="ob-options" style="max-height:48vh;overflow-y:auto">
      ${sortedLib.map(h => {
        const sel = ob.data.selected_habits.includes(h.key);
        const rec = recommended.includes(h.key);
        const isSupport = h.tag === 'support';
        return `
          <button type="button" class="ob-option ${sel ? 'selected' : ''}" onclick="obToggleHabit('${h.key}')">
            <div>
              <div class="ob-option-title">${h.name}${rec ? `<span class="ob-rec-tag ${isSupport ? 'support' : ''}">${isSupport ? 'Support' : 'Empfohlen'}</span>` : ''}</div>
              <div class="ob-option-sub">${h.desc}</div>
            </div>
            <div class="ob-option-check"></div>
          </button>`;
      }).join('')}
    </div>
    <div class="ob-actions">
      <button class="btn" onclick="obBack()">← Zurück</button>
      <button class="btn primary" onclick="obFinish()">Fertig ✓</button>
    </div>
  `;
}

function obSet(key, value) { ob.data[key] = value; render(); }
function obToggleHabit(key) {
  const i = ob.data.selected_habits.indexOf(key);
  if (i >= 0) ob.data.selected_habits.splice(i, 1);
  else ob.data.selected_habits.push(key);
  render();
}
function obBack() { if (ob.step > 0) ob.step--; render(); }
function obSaveAndNext(currentStep) {
  if (currentStep === 'welcome') {
    const v = (document.getElementById('obName').value || '').trim();
    if (!v) { flash('Bitte gib einen Namen ein', true); return; }
    ob.data.display_name = v;
  }
  if (currentStep === 'basics') {
    const b = document.getElementById('obBirth').value;
    if (!b) { flash('Bitte gib dein Geburtsdatum ein', true); return; }
    if (!ob.data.sex) { flash('Bitte wähle ein Geschlecht', true); return; }
    ob.data.birth_date = b;
  }
  if (currentStep === 'body') {
    const h = parseFloat(document.getElementById('obHeight').value);
    const w = parseFloat(document.getElementById('obWeight').value);
    if (!h || !w) { flash('Bitte fülle beide Felder', true); return; }
    ob.data.height_cm = h;
    ob.data.weight_kg = w;
  }
  if (currentStep === 'goal' && ob.data.goal !== 'maintain') {
    const t = document.getElementById('obTarget');
    if (t) ob.data.target_weight_kg = parseFloat(t.value) || null;
  }
  ob.step++;
  render();
}

function calcAge(birthDate) {
  const b = new Date(birthDate);
  const now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  const m = now.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
  return age;
}
function calcTargets(d) {
  const age = calcAge(d.birth_date);
  const w = d.weight_kg, h = d.height_cm;
  let bmr;
  if (d.sex === 'male') bmr = 10 * w + 6.25 * h - 5 * age + 5;
  else if (d.sex === 'female') bmr = 10 * w + 6.25 * h - 5 * age - 161;
  else bmr = 10 * w + 6.25 * h - 5 * age - 78;
  const factors = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 };
  const tdee = bmr * (factors[d.activity_level] || 1.4);
  let kcal = tdee;
  if (d.goal === 'lose') kcal -= 400;
  else if (d.goal === 'gain') kcal += 300;
  else if (d.goal === 'recomp') kcal -= 200;
  kcal = Math.round(kcal / 10) * 10;
  const protein = Math.round(w * 1.8);
  const fat = Math.round((kcal * 0.25) / 9);
  const carbs = Math.round((kcal - (protein * 4) - (fat * 9)) / 4);
  return { kcal, protein, carbs, fat };
}

async function obFinish() {
  try {
    if (ob.data.selected_habits.length === 0) {
      if (!confirm('Keine Habits ausgewählt. Trotzdem fortfahren?')) return;
    }
    const targets = calcTargets(ob.data);
    const profileData = {
      id: userId,
      display_name: ob.data.display_name,
      birth_date: ob.data.birth_date,
      sex: ob.data.sex,
      height_cm: ob.data.height_cm,
      goal: ob.data.goal,
      target_weight_kg: ob.data.target_weight_kg,
      activity_level: ob.data.activity_level,
      experience: ob.data.experience,
      emotional_eating: ob.data.emotional_eating,
      kcal_target: targets.kcal,
      protein_target_g: targets.protein,
      carbs_target_g: targets.carbs,
      fat_target_g: targets.fat,
      water_target_ml: 2500,
      onboarding_completed: true,
      updated_at: new Date().toISOString()
    };

    await ldb.profile.put(profileData);
    await enqueue('profiles', 'update', profileData);
    profile = profileData;

    if (ob.data.weight_kg) {
      await dbInsert('weights', { measured_on: todayISO(), weight_kg: ob.data.weight_kg });
    }

    let order = 0;
    for (const key of ob.data.selected_habits) {
      const def = HABIT_LIBRARY.find(h => h.key === key);
      if (def) {
        await dbInsert('habits', {
          name: def.name, description: def.desc,
          target_frequency: 7, active: true, sort_order: order++
        });
      }
    }
    console.log('Onboarding complete. Created', ob.data.selected_habits.length, 'habits.');

    flash('Willkommen ✓');
    view.screen = 'home';
    render();
    trySyncOutbox();
  } catch (e) {
    console.error('Onboarding finish failed:', e);
    flash('Fehler beim Speichern: ' + e.message, true);
  }
}

async function renderTrack() {
  const p = await ldb.plans.get(view.planId);
  if (!p) { view.screen = 'training'; return render(); }
  const days = (await ldb.days.where('plan_id').equals(view.planId).toArray()).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  if (!days.length) { view.screen = 'plan'; return render(); }
  if (!view.trackDayId || !days.find(d => d.id === view.trackDayId)) view.trackDayId = days[0].id;
  const currentDay = days.find(d => d.id === view.trackDayId);

  const allWorkouts = await ldb.workouts.toArray();
  const planWorkouts = allWorkouts.filter(w => w.plan_id === view.planId);
  const existingWeeks = [...new Set(planWorkouts.map(w => w.week_number || 1))].sort((a,b)=>a-b);
  if (!existingWeeks.includes(view.week)) existingWeeks.push(view.week);
  existingWeeks.sort((a,b)=>a-b);

  let workout = planWorkouts.find(w => w.day_id === view.trackDayId && (w.week_number || 1) === view.week);
  if (!workout) {
    workout = await dbInsert('workouts', { plan_id: view.planId, day_id: view.trackDayId, workout_date: todayISO(), week_number: view.week });
    const exs = await ldb.exercises.where('day_id').equals(view.trackDayId).toArray();
    for (const ex of exs) {
      for (let i = 0; i < ex.target_sets; i++) {
        await dbInsert('workout_sets', {
          workout_id: workout.id, exercise_id: ex.id, set_number: i + 1,
          reps: null, intensity: ex.intensity || null, done: false
        });
      }
    }
  }

  appEl.innerHTML = `
    <div class="shell">
      <button class="back-link" onclick="openPlan('${p.id}')">${esc(p.name)}</button>
      <div class="date-line">Woche ${pad(view.week)} · ${formatDateLong(workout.workout_date)}</div>
      <h1 class="page-h">${esc(currentDay.name)}</h1>

      <div class="section-label" style="margin-top:24px"><div class="section-label-text">Woche</div></div>
      <div class="chips">
        ${existingWeeks.map(w => `<button class="chip ${w === view.week ? 'active' : ''}" onclick="setWeek(${w})">Woche ${pad(w)}</button>`).join('')}

      </div>

      <div class="section-label"><div class="section-label-text">Tag</div></div>
      <div class="chips">
        ${days.map(d => `<button class="chip ${d.id === view.trackDayId ? 'active' : ''}" onclick="setTrackDay('${d.id}')">${esc(d.name)}</button>`).join('')}

          <div style="font-size:14px;font-weight:500">${formatDateLong(workout.workout_date)}</div>

        <input type="date" class="input" style="max-width:160px;padding:8px 10px" value="${workout.workout_date}" onchange="updateWorkoutDate('${workout.id}', this.value)" />
      </div>

      ${await renderTrackBody(workout, currentDay)}
    </div>
  `;
}
async function setWeek(w) { view.week = w; render(); }
async function setTrackDay(id) { view.trackDayId = id; render(); }
async function addWeek() {
  const allWorkouts = await ldb.workouts.toArray();
  const planWs = allWorkouts.filter(w => w.plan_id === view.planId);
  const max = planWs.length ? Math.max(...planWs.map(w => w.week_number || 1)) : 0;
  view.week = max + 1;
  render();

async function updateWorkoutDate(workoutId, date) {
  await dbUpdate('workouts', workoutId, { workout_date: date });
  render();
}

async function renderTrackBody(workout, day) {
  const exs = (await ldb.exercises.where('day_id').equals(day.id).toArray()).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const allSets = await ldb.workout_sets.where('workout_id').equals(workout.id).toArray();
  const setsByEx = {};
  for (const s of allSets) {
    if (!setsByEx[s.exercise_id]) setsByEx[s.exercise_id] = [];
    setsByEx[s.exercise_id].push(s);
  }
  for (const k in setsByEx) setsByEx[k].sort((a,b)=>(a.set_number||0)-(b.set_number||0));

  let totalSets = 0, doneSets = 0;
  for (const ex of exs) {
    const sets = setsByEx[ex.id] || [];
    totalSets += sets.length;
    doneSets += sets.filter(s => s.done).length;
  }
  const pct = totalSets ? Math.round(doneSets / totalSets * 100) : 0;

  const allWorkouts = await ldb.workouts.toArray();
  const lastByEx = {};
  for (const ex of exs) {
    const candidates = allWorkouts.filter(w => w.day_id === day.id && (w.week_number || 1) < view.week)
      .sort((a,b) => (b.week_number || 1) - (a.week_number || 1));
    for (const c of candidates) {
      const cs = (await ldb.workout_sets.where('workout_id').equals(c.id).toArray()).filter(s => s.exercise_id === ex.id);
      if (cs.length) { lastByEx[ex.id] = { workout: c, sets: cs.sort((a,b)=>(a.set_number||0)-(b.set_number||0)) }; break; }
    }
  }

  return `
    <div class="progress-big">
      <div>
        <div class="section-label-text" style="margin-bottom:6px">FORTSCHRITT</div>
        <div class="progress-big-num">${doneSets}<span> / ${totalSets}</span></div>
      </div>
      <div class="progress-big-meta"><strong>${pct}%</strong>erledigt</div>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${exs.length === 0 ? `<div class="empty-card"><div class="empty-icon">∅</div><div class="empty-text">Keine Übungen in diesem Tag</div></div>` :
      exs.map(ex => {
        const sets = setsByEx[ex.id] || [];
        const last = lastByEx[ex.id];
        return `
          <div class="ex-card">
            <div class="ex-name">${esc(ex.name)}</div>
            <div class="ex-target">Ziel · ${ex.target_sets} × ${repText(ex)}${ex.intensity ? ' · ' + esc(ex.intensity) : ''}</div>
            ${last ? `
              <div class="last-session">
                <div class="last-session-label">Letztes · W${pad(last.workout.week_number || 1)} · ${formatDateShort(last.workout.workout_date)}</div>
                <strong>${last.sets.map(s => s.reps != null ? s.reps : '–').join(' · ')}</strong>${last.sets.some(s => s.intensity) ? ' · ' + esc(last.sets.map(s => s.intensity).filter(Boolean).join(', ')) : ''}
              </div>
            ` : `<div class="last-session empty"><div class="last-session-label">Letztes Training · —</div></div>`}
            <div class="set-col-head"><div>#</div><div>Wdh</div><div>Intensität</div><div></div></div>
            <div class="set-list">
              ${sets.map(s => `
                <div class="set-row ${s.done ? 'done' : ''}">
                  <div class="set-row-num">${pad(s.set_number)}</div>
                  <input class="set-input" type="text" inputmode="numeric" value="${s.reps != null ? s.reps : ''}" placeholder="${repText(ex)}" onchange="updateSet('${s.id}','reps',this.value)" />
                  <input class="set-input" type="text" value="${esc(s.intensity || '')}" placeholder="${ex.intensity ? esc(ex.intensity) : '—'}" onchange="updateSet('${s.id}','intensity',this.value)" />
                  <button class="set-check ${s.done ? 'on' : ''}" onclick="toggleSet('${s.id}')"></button>
                </div>
              `).join('')}
            </div>
            <div class="set-controls">
              <button class="set-ctrl" onclick="addSet('${workout.id}','${ex.id}')">+ Satz</button>
              ${sets.length > 1 ? `<button class="set-ctrl" onclick="removeSet('${sets[sets.length-1].id}')">− Satz</button>` : ''}
            </div>
          </div>
        `;
      }).join('')}
  `;
}
async function updateSet(id, field, value) {
  let parsed = value;
  if (field === 'reps') parsed = value === '' ? null : parseInt(value) || null;
  await dbUpdate('workout_sets', id, { [field]: parsed });
}
async function toggleSet(id) {
  const s = await ldb.workout_sets.get(id);
  if (!s) return;
  await dbUpdate('workout_sets', id, { done: !s.done });
  render();
}
async function addSet(workoutId, exerciseId) {
  const existing = (await ldb.workout_sets.where('workout_id').equals(workoutId).toArray()).filter(s => s.exercise_id === exerciseId);
  const nextNum = existing.length ? Math.max(...existing.map(s => s.set_number)) + 1 : 1;
  const ex = await ldb.exercises.get(exerciseId);
  await dbInsert('workout_sets', { workout_id: workoutId, exercise_id: exerciseId, set_number: nextNum, intensity: ex?.intensity || null, done: false });
  render();
}
async function removeSet(id) { await dbDelete('workout_sets', id); render(); }

/* ═══════════════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════════════ */
async function renderHabits() {
  const habits = (await ldb.habits.toArray()).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const t = todayISO();
  const dates = [];
  for (let i = 13; i >= 0; i--) dates.push(addDaysISO(t, -i));
  const allLogs = await ldb.habit_logs.toArray();
  const logMap = {};
  for (const l of allLogs) {
    logMap[l.habit_id] = logMap[l.habit_id] || {};
    logMap[l.habit_id][l.log_date] = l.done;
  }

  appEl.innerHTML = `
    <div class="shell">
      <button class="back-link" onclick="goTab('home')">Home</button>
      <h1 class="page-h">Habits<span class="accent">.</span></h1>
      <p class="page-sub">${habits.length} aktive Habits · ${formatDateLong(t)}</p>

      <div class="add-bar">
        <input id="newHabitName" placeholder="Neuen Habit benennen…" />
        <button class="add-btn" onclick="addHabit()" aria-label="Habit hinzufügen">+</button>
      </div>

      ${habits.length === 0 ? `
        <div class="empty-card">
          <div class="empty-icon">∅</div>
          <div class="empty-text">Noch keine Habits<br>Tippe oben einen Namen ein und drücke +</div>
        </div>
      ` : habits.map(h => {
        const todayDone = logMap[h.id]?.[t];
        const streak = calcStreakSync(h.id, logMap, t);
        return `
          <div class="habit-card">
            <div>
              <div class="habit-name">${esc(h.name)}</div>
              <div class="habit-streak">Streak · <strong>${streak} ${streak === 1 ? 'Tag' : 'Tage'}</strong></div>
              <div class="habit-heatmap">
                ${dates.map(d => `<div class="heat-cell ${logMap[h.id]?.[d] ? 'on' : ''} ${d === t ? 'today' : ''}"></div>`).join('')}
              </div>
            </div>
            <div class="habit-side">
              <button class="habit-check ${todayDone ? 'on' : ''}" onclick="toggleHabit('${h.id}')" aria-label="Heute"></button>
              <button class="row-del" onclick="deleteHabit('${h.id}')">×</button>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  bindEnter('newHabitName', addHabit);
}
function calcStreakSync(habitId, logMap, today) {
  let streak = 0, cursor = today;
  while (logMap[habitId]?.[cursor]) { streak++; cursor = addDaysISO(cursor, -1); }
  return streak;
}
async function addHabit() {
  const el = document.getElementById('newHabitName');
  const name = (el?.value || '').trim();
  if (!name) { flash('Bitte gib einen Namen ein', true); return; }
  const all = await ldb.habits.toArray();
  await dbInsert('habits', { name, target_frequency: 7, active: true, sort_order: all.length });
  el.value = '';
  render();
}
async function deleteHabit(id) {
  if (!confirm('Habit löschen?')) return;
  await dbDelete('habits', id);
  render();
}
async function toggleHabit(id) {
  const t = todayISO();
  const existing = (await ldb.habit_logs.where('log_date').equals(t).toArray()).find(l => l.habit_id === id);
  if (existing) {
    if (existing.done) await dbDelete('habit_logs', existing.id);
    else await dbUpdate('habit_logs', existing.id, { done: true });
  } else {
    await dbInsert('habit_logs', { habit_id: id, log_date: t, done: true });
  }
  render();
}

async function offLookup(barcode) {
  if (!isOnline) return null;
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json?fields=product_name,brands,nutriments,serving_size,serving_quantity`);
    const j = await r.json();
    if (j.status !== 1 || !j.product) return null;
    const p = j.product;
    const n = p.nutriments || {};
    const servingG = parseFloat(p.serving_quantity) || null;
    return {
      name: p.product_name || ('Produkt ' + barcode),
      brand: p.brands || null,
      barcode,
      kcal_per_100g: parseFloat(n['energy-kcal_100g']) || (parseFloat(n['energy-kj_100g']) ? parseFloat(n['energy-kj_100g'])/4.184 : 0),
      protein_per_100g: parseFloat(n['proteins_100g']) || 0,
      carbs_per_100g: parseFloat(n['carbohydrates_100g']) || 0,
      fat_per_100g: parseFloat(n['fat_100g']) || 0,
      fiber_per_100g: parseFloat(n['fiber_100g']) || null,
      sugar_per_100g: parseFloat(n['sugars_100g']) || null,
      salt_per_100g: parseFloat(n['salt_100g']) || null,
      serving_size_g: servingG,
      serving_label: p.serving_size || null,
      source: 'openfoodfacts',
      source_id: barcode
    };
  } catch (e) { console.warn('OFF lookup failed', e); return null; }
}

async function openScanner() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return flash('Kamera nicht verfügbar', true);
  }
  scannerWrap.style.display = 'block';
  scannerWrap.innerHTML = `
    <div class="scanner-wrap">
      <div class="scanner-video">
        <video id="scanVideo" playsinline></video>
        <div class="scanner-overlay">
          <div class="scanner-frame"><div class="scanner-bar"></div></div>
        </div>
        <div class="scanner-top">
          <button class="scanner-close" onclick="closeScanner()">×</button>
          <div style="color:#fff;font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em">Barcode scannen</div>
          <div style="width:40px"></div>
        </div>
        <div class="scanner-bottom">Halte den Barcode ins Rechteck</div>
      </div>
    </div>
  `;
  try {
    const codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    scannerControls = await codeReader.decodeFromConstraints(
      { video: { facingMode: 'environment' } },
      document.getElementById('scanVideo'),
      async (result, _err, controls) => {
        if (result) { const code = result.getText(); controls.stop(); await onBarcodeScanned(code); }
      }
    );
  } catch (e) {
    console.error(e);
    flash('Kamera-Zugriff verweigert', true);
    closeScanner();
  }
}
function closeScanner() {
  if (scannerControls) { try { scannerControls.stop(); } catch {} }
  scannerControls = null;
  scannerWrap.style.display = 'none';
  scannerWrap.innerHTML = '';
}
async function onBarcodeScanned(barcode) {
  closeScanner();
  const all = await ldb.foods.toArray();
  let food = all.find(f => f.barcode === barcode);
  if (food) { flash('Bekanntes Produkt'); openLogFoodModal(food.id); return; }
  flash('Suche in Open Food Facts…');
  const offData = await offLookup(barcode);
  if (offData && offData.kcal_per_100g > 0) {
    food = await dbInsert('foods', offData);
    flash('Gefunden ✓');
    openLogFoodModal(food.id);
  } else {
    flash('Nicht gefunden, bitte anlegen', true);
    openCreateFoodModal({ barcode });
  }
}

async function updateLogPreview() {
  const f = await ldb.foods.get(loggingFoodId);
  if (!f) return;
  const grams = parseFloat(document.getElementById('logGrams').value) || 0;
  const factor = grams / 100;
  const kcal = Math.round(f.kcal_per_100g * factor);
  const p = (f.protein_per_100g * factor).toFixed(1);
  const c = (f.carbs_per_100g * factor).toFixed(1);
  const fat = (f.fat_per_100g * factor).toFixed(1);
  const box = document.getElementById('logPreview');
  if (box) box.innerHTML = `<strong style="color:var(--ink)">${kcal} kcal</strong> · P ${p}g · K ${c}g · F ${fat}g`;

  await dbInsert('food_entries', {

    name_snapshot: f.name, kcal: f.kcal_per_100g * factor,
    protein_g: (f.protein_per_100g || 0) * factor,
    carbs_g: (f.carbs_per_100g || 0) * factor,
    fat_g: (f.fat_per_100g || 0) * factor
  });
  await dbUpdate('foods', f.id, { last_used_at: new Date().toISOString(), use_count: (f.use_count || 0) + 1 });

  flash('Eingetragen ✓');
  render();

/* Chart helpers */
function renderLineChart(series) {
  if (!series || series.length < 2) return `<div style="padding:30px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3)">NICHT GENUG DATEN</div>`;
  const w = 560, h = 180, pd = { t:14, r:18, b:30, l:36 };
  const ys = series.map(s => s.y);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const range = (maxY - minY) || 1;
  const yMin = minY - range * 0.1, yMax = maxY + range * 0.1;
  const sx = i => pd.l + (i / (series.length - 1)) * (w - pd.l - pd.r);
  const sy = v => pd.t + (1 - (v - yMin) / (yMax - yMin)) * (h - pd.t - pd.b);
  const path = series.map((s, i) => `${i === 0 ? 'M' : 'L'}${sx(i).toFixed(1)},${sy(s.y).toFixed(1)}`).join(' ');
  const dots = series.map((s, i) => `<circle class="dot" cx="${sx(i).toFixed(1)}" cy="${sy(s.y).toFixed(1)}" r="3" />`).join('');
  let yLabels = '';
  for (let i = 0; i <= 3; i++) {
    const v = yMin + (i / 3) * (yMax - yMin);
    yLabels += `<text x="${pd.l - 6}" y="${sy(v) + 3}" text-anchor="end">${v.toFixed(1)}</text>`;
    yLabels += `<line class="grid" x1="${pd.l}" x2="${w - pd.r}" y1="${sy(v)}" y2="${sy(v)}" />`;
  }
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${yLabels}<text x="${pd.l}" y="${h-8}">${formatDateShort(series[0].x)}</text><text x="${w-pd.r}" y="${h-8}" text-anchor="end">${formatDateShort(series[series.length-1].x)}</text><path class="line" d="${path}" />${dots}</svg>`;
}
function renderBarChart(series, target, isPct) {
  if (!series || !series.length) return `<div style="padding:30px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3)">KEINE DATEN</div>`;
  const w = 560, h = 180, pd = { t:14, r:18, b:30, l:36 };
  const ys = series.map(s => s.y);
  const maxY = Math.max(...ys, target || 0);
  const yMax = Math.max(1, maxY * 1.15);
  const slot = (w - pd.l - pd.r) / series.length;
  const barW = slot * 0.72;
  const gap = slot * 0.28;
  const sx = i => pd.l + i * slot + gap / 2;
  const sy = v => pd.t + (1 - v / yMax) * (h - pd.t - pd.b);
  const bars = series.map((s, i) => {
    const y = sy(s.y);
    const ht = (h - pd.t - pd.b) - (y - pd.t);
    const cls = target && s.y >= target ? '' : 'under';
    return `<rect class="bar ${cls}" x="${sx(i).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0, ht).toFixed(1)}" rx="2" />`;
  }).join('');
  const targetLine = target ? `<line class="target-line" x1="${pd.l}" x2="${w - pd.r}" y1="${sy(target)}" y2="${sy(target)}" />` : '';
  return `<svg class="chart" viewBox="0 0 ${w} ${h}"><text x="${pd.l-6}" y="${pd.t+8}" text-anchor="end">${isPct ? '100%' : Math.round(yMax)}</text>${bars}${targetLine}<text x="${pd.l}" y="${h-8}">${formatDateShort(series[0].x)}</text><text x="${w-pd.r}" y="${h-8}" text-anchor="end">${formatDateShort(series[series.length-1].x)}</text></svg>`;
}
function renderDualChart(kcal, weight) {
  if (!kcal.length || weight.length < 2) return `<div style="padding:30px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3)">NICHT GENUG DATEN</div>`;
  const w = 560, h = 180, pd = { t:14, r:36, b:30, l:36 };
  const kY = kcal.map(s => s.y).filter(y => y > 0);
  const wY = weight.map(s => s.y);
  const kMax = Math.max(...kY, 1) * 1.15;
  const wMin = Math.min(...wY), wMax = Math.max(...wY);
  const wR = (wMax - wMin) || 1;
  const wYMin = wMin - wR * 0.15, wYMax = wMax + wR * 0.15;
  const sx = i => pd.l + (i / (kcal.length - 1)) * (w - pd.l - pd.r);
  const sKy = v => pd.t + (1 - v / kMax) * (h - pd.t - pd.b);
  const sWy = v => pd.t + (1 - (v - wYMin) / (wYMax - wYMin)) * (h - pd.t - pd.b);
  const idxMap = {}; kcal.forEach((s, i) => { idxMap[s.x] = i; });
  const wPts = weight.filter(s => idxMap[s.x] !== undefined);
  const kBars = kcal.map((s, i) => {
    if (!s.y) return '';
    const x = sx(i); const y = sKy(s.y);
    return `<rect class="bar" x="${(x-2.5).toFixed(1)}" y="${y.toFixed(1)}" width="5" height="${(h-pd.b-y).toFixed(1)}" rx="1" />`;
  }).join('');
  const wPath = wPts.length >= 2 ? wPts.map((s, i) => `${i===0?'M':'L'}${sx(idxMap[s.x]).toFixed(1)},${sWy(s.y).toFixed(1)}`).join(' ') : '';
  const wDots = wPts.map(s => `<circle class="dot-2" cx="${sx(idxMap[s.x]).toFixed(1)}" cy="${sWy(s.y).toFixed(1)}" r="3" />`).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}"><text x="${pd.l-6}" y="${pd.t+8}" text-anchor="end">${Math.round(kMax)}</text><text x="${pd.l-6}" y="${h-pd.b}" text-anchor="end">0</text><text x="${w-pd.r+4}" y="${pd.t+8}">${wYMax.toFixed(1)}</text><text x="${w-pd.r+4}" y="${h-pd.b}">${wYMin.toFixed(1)}</text>${kBars}${wPath?`<path class="line-2" d="${wPath}" />`:''}${wDots}<text x="${pd.l}" y="${h-8}">${formatDateShort(kcal[0].x)}</text><text x="${w-pd.r}" y="${h-8}" text-anchor="end">${formatDateShort(kcal[kcal.length-1].x)}</text></svg>`;
}

    <div class="cta-body"><div class="cta-pre" style="color:var(--teal)">Ausführlicher</div><div class="cta-h">Mit Auslöser & Notiz</div></div>
    <div class="cta-arrow" style="color:var(--teal)">→</div>
  </button>

  <div class="section-label"><div class="section-label-text">Einträge heute</div><div class="section-label-count">${todayEntries.length}</div></div>
  ${todayEntries.length === 0 ? `<div class="empty-card"><div class="empty-icon">∅</div><div class="empty-text">Noch kein Check-in heute</div></div>` : todayEntries.map(e => {
    const trig = e.trigger ? TRIGGERS.find(x => x.v === e.trigger) : null;
    return `
      <div class="mood-entry-card">
        <div class="mood-entry-head">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="mood-entry-emoji">${MOOD_EMOJI[e.mood]}</div>
            <div>
              ${trig ? `<div class="mood-entry-trigger">${trig.e} ${trig.l}</div>` : ''}
              ${e.craving ? `<div class="mood-entry-trigger craving">🫐 Craving${e.craving_food ? ' · ' + esc(e.craving_food) : ''}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="mood-entry-time">${(e.entry_time||'').slice(0,5)}</div>
            <button class="row-del" onclick="deleteMoodEntry('${e.id}')">×</button>
          </div>
        </div>
        ${e.notes ? `<div class="mood-entry-notes">${esc(e.notes)}</div>` : ''}
      </div>
    `;
  }).join('')}
</div>
```

`;
