<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitJournal Test</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #f5f0e8; color: #2d251c; padding: 20px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #efe8dc; border: 1px solid #e0d4be; border-radius: 16px; padding: 24px; max-width: 380px; width: 100%; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  .accent { color: #b85d3e; }
  p { color: #6b5f50; font-size: 14px; margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #6b5f50; margin-bottom: 6px; }
  input { width: 100%; padding: 12px; border: 1.5px solid #e0d4be; border-radius: 10px; font-size: 15px; color: #2d251c; background: #f5f0e8; margin-bottom: 14px; box-sizing: border-box; outline: none; }
  input:focus { border-color: #b85d3e; }
  button { width: 100%; padding: 14px; background: #b85d3e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .error { background: #f0d4cf; color: #b04a3e; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
  .status { font-family: monospace; font-size: 11px; color: #9a8c78; margin-top: 16px; text-align: center; }
  .ok { color: #4a7a4f; }
  .fail { color: #b04a3e; }
</style>
</head>
<body>
<div class="card">
  <h1>FitJournal <span class="accent">Test</span></h1>
  <p>Minimaler Login-Test</p>
  <div id="status"></div>
  <div id="loginForm" style="display:none">
    <label>E-Mail</label>
    <input id="email" type="email" placeholder="du@beispiel.de">
    <label>Passwort</label>
    <input id="pass" type="password" placeholder="min. 6 Zeichen">
    <div id="err" class="error"></div>
    <button onclick="doLogin()">Anmelden / Registrieren</button>
  </div>
  <div id="loggedIn" style="display:none">
    <p class="ok" style="font-size:18px;font-weight:600">Eingeloggt!</p>
    <div id="userInfo"></div>
    <button onclick="doLogout()" style="background:#6b5f50;margin-top:12px">Abmelden</button>
  </div>
</div>

<script>
var statusEl = document.getElementById('status');
var loginEl = document.getElementById('loginForm');
var loggedEl = document.getElementById('loggedIn');
var errEl = document.getElementById('err');

function log(msg, ok) {
  statusEl.innerHTML += '<div class="' + (ok ? 'ok' : (ok === false ? 'fail' : '')) + '">' + msg + '</div>';
}

async function init() {
  log('1. Lade Supabase...');
  
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.js');
    log('Supabase geladen', true);
  } catch(e) {
    log('Supabase FEHLER: ' + e.message, false);
    return;
  }

  log('2. Erstelle Client...');
  try {
    window.sb = supabase.createClient(
      'https://mufqgmprllaukxakqbil.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZnFnbXBybGxhdWt4YWtxYmlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDEzODksImV4cCI6MjA5MTc3NzM4OX0.iBWKk_TeLs1097fJ3XlsPFmFFraiGwDebvnTCDXKf6w'
    );
    log('Client erstellt', true);
  } catch(e) {
    log('Client FEHLER: ' + e.message, false);
    return;
  }

  log('3. Pruefe Session...');
  try {
    var result = await sb.auth.getSession();
    if (result.error) throw result.error;
    var session = result.data.session;
    
    if (session) {
      log('Eingeloggt als ' + session.user.email, true);
      showLoggedIn(session.user);
    } else {
      log('Nicht eingeloggt - zeige Login', true);
      loginEl.style.display = 'block';
    }
  } catch(e) {
    log('Session FEHLER: ' + e.message, false);
    loginEl.style.display = 'block';
  }
}

function showLoggedIn(user) {
  loginEl.style.display = 'none';
  loggedEl.style.display = 'block';
  document.getElementById('userInfo').innerHTML = '<div style="font-family:monospace;font-size:12px;color:#6b5f50">User: ' + user.email + '<br>ID: ' + user.id + '</div>';
}

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var pass = document.getElementById('pass').value;
  if (!email || !pass) { showErr('E-Mail und Passwort eingeben'); return; }
  errEl.style.display = 'none';
  
  // Try login first
  var result = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (result.error) {
    // If login fails, try signup
    log('Login fehlgeschlagen, versuche Registrierung...', false);
    var result2 = await sb.auth.signUp({ email: email, password: pass });
    if (result2.error) {
      showErr(result2.error.message);
      return;
    }
    if (result2.data.user) {
      log('Registriert!', true);
      showLoggedIn(result2.data.user);
    }
  } else {
    log('Eingeloggt!', true);
    showLoggedIn(result.data.user);
  }
}

async function doLogout() {
  await sb.auth.signOut();
  loggedEl.style.display = 'none';
  loginEl.style.display = 'block';
  log('Abgemeldet', true);
}

function showErr(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function loadScript(url) {
  return new Promise(function(ok, fail) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = ok;
    s.onerror = function() { fail(new Error('Script load failed')); };
    document.head.appendChild(s);
  });
}

init();
</script>

</body>
</html>
